<script>
const SESSION='s9', NEXT='examen-final.html', EXAM='examen-avanzado.html';
const ph=id=>`https://images.unsplash.com/photo-${id}?auto=format&fit=crop&w=1100&q=72`;
const ext=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M9 7h8v8"/></svg>`;

const UNITS=[
  {
    short:'¿Qué es RevOps?',dur:'6 min',title:'¿Qué es RevOps?',
    media:ph('1556761175-5973dc0f32e7'),alt:'Un equipo trabajando junto sobre la misma información.',
    html:`<div class="prose">
      <p>Cerramos el programa con la mirada grande. <b>RevOps</b> es la sigla de <i>Revenue Operations</i>, o sea: operaciones de ingresos. Suena raro, pero la idea es sencilla.</p>
      <p>Pensá en una empresa donde marketing, ventas y atención al cliente trabajan cada uno con su propia planilla y sus propios números. Marketing dice que generó 100 interesados, ventas dice que recibió 40, y atención no se entera de nada. ¿Quién tiene razón? Nadie sabe, porque cada equipo mira datos distintos.</p>
      <p><b>RevOps es alinear a esos tres equipos sobre los mismos datos, las mismas reglas y el mismo objetivo: que el cliente tenga una buena experiencia de punta a punta.</b> En lugar de tres islas, un solo recorrido.</p>
      <div class="compare"><div class="col bad"><h5>Sin RevOps</h5><p>Cada equipo con sus números. Discusiones por quién tiene razón y clientes que repiten su historia en cada área.</p></div><div class="col good"><h5>Con RevOps</h5><p>Marketing, ventas y atención sobre los mismos datos. Un cliente, un historial, un recorrido sin baches.</p></div></div>
      <div class="note"><b>Ojo:</b> RevOps no es una herramienta que se compra. Es una forma de trabajar: procesos, datos y equipos remando para el mismo lado. El CRM es donde eso se vuelve concreto.</div>
    </div>`,
    hs:[{t:'Introduction to Revenue Operations (RevOps)',u:'https://academy.hubspot.com/lessons/introduction-to-revenue-operations-revops',k:'HubSpot Academy'},{t:'Implementing a Revenue Ops Strategy in HubSpot',u:'https://academy.hubspot.com/lessons/implementing-a-revenue-ops-strategy-in-hubspot',k:'HubSpot Academy'}],
    q:'¿Cuál es la mejor forma de explicar qué es RevOps?',
    opts:[
      {t:'Un programa nuevo que se compra aparte del CRM para generar ingresos.',ok:false,fb:'No es una herramienta que se compra. RevOps es una forma de trabajar que alinea equipos, datos y procesos.'},
      {t:'Alinear a marketing, ventas y atención sobre los mismos datos y el mismo objetivo, para que el cliente tenga un recorrido sin baches.',ok:true,fb:'Eso es. La clave está en "los mismos datos": un cliente, un historial, tres equipos remando para el mismo lado.'},
      {t:'Una función exclusiva del equipo de ventas para cerrar más rápido.',ok:false,fb:'No. RevOps justamente cruza los tres equipos: marketing, ventas y atención. No es solo de ventas.'},
      {t:'Un reporte que muestra cuánta plata entró el mes pasado.',ok:false,fb:'Eso es un reporte de ingresos. RevOps es la forma de trabajar que hace que esos números sean confiables.'},
    ]
  },
  {
    short:'Nativas vs API',dur:'6 min',title:'Integraciones: nativas vs por API',
    media:ph('1517245386807-bb43f82c33c4'),alt:'Aplicaciones y herramientas conectadas entre sí.',
    html:`<div class="prose">
      <p>Para que los equipos compartan datos, el CRM tiene que hablar con las otras herramientas: el correo, la facturación, el chat, la web. A esa conexión la llamamos <b>integración</b>. Y hay dos caminos para armarla.</p>
      <ul>
        <li><b>Integración nativa:</b> ya viene lista. La buscás en el marketplace, hacés clic en "conectar" y listo. No necesitás programar. Es como enchufar un electrodoméstico: ya está pensado para encajar.</li>
        <li><b>Integración por API:</b> es a medida. Cuando no existe una conexión lista para lo que necesitás, un equipo técnico la construye usando la API (la "puerta" que cada sistema deja para conectarse). Más flexible, pero requiere desarrollo.</li>
      </ul>
      <p>¿Cuándo usar cada una? Regla práctica: <b>si existe una nativa que hace lo que necesitás, usá la nativa.</b> Es más rápida, más barata y la mantiene el proveedor. Dejá la API para los casos especiales que ninguna conexión lista resuelve.</p>
      <div class="note"><b>Para recordar:</b> nativa = lista para enchufar. API = hecha a medida. Empezá siempre buscando si ya existe la nativa.</div>
    </div>`,
    hs:[{t:'Install apps in the HubSpot Marketplace',u:'https://knowledge.hubspot.com/marketplace/install-apps-in-the-hubspot-marketplace',k:'HubSpot KB'},{t:'Connect and use HubSpot data sync',u:'https://knowledge.hubspot.com/integrations/connect-and-use-hubspot-data-sync',k:'HubSpot KB'}],
    q:'Necesitás conectar tu CRM con una herramienta muy conocida y ya existe una integración lista en el marketplace. ¿Qué conviene?',
    opts:[
      {t:'Pedir que programen una integración a medida por API desde cero.',ok:false,fb:'Sería reinventar la rueda: más caro, más lento y tenés que mantenerla vos. Si hay nativa, usá la nativa.'},
      {t:'Usar la integración nativa: la conectás en pocos clics y la mantiene el proveedor.',ok:true,fb:'Correcto. Si ya existe la nativa, es la opción más rápida, barata y fácil de mantener.'},
      {t:'No integrar y copiar los datos a mano de un sistema al otro.',ok:false,fb:'Copiar a mano es lento y se llena de errores. Para eso justamente existe la integración.'},
      {t:'Las dos a la vez, nativa y por API, por las dudas.',ok:false,fb:'Eso duplica el trabajo y puede generar conflictos. Elegí una sola para cada conexión.'},
    ]
  },
  {
    short:'Dirección del sync',dur:'6 min',title:'Dirección del sync y fuente de verdad',
    media:ph('1460925895917-afdab827c52f'),alt:'Datos sincronizándose entre dos pantallas.',
    html:`<div class="prose">
      <p>Cuando dos sistemas están conectados, los datos se <b>sincronizan</b> (se copian de un lado al otro). Pero hay que decidir en qué dirección viaja la información. Hay dos opciones.</p>
      <ul>
        <li><b>Una vía (un solo sentido):</b> los datos van de A hacia B, pero no vuelven. Por ejemplo, el sistema de facturación manda al CRM, pero el CRM no toca la facturación.</li>
        <li><b>Dos vías (bidireccional):</b> los datos viajan en los dos sentidos. Si lo cambiás en cualquiera de los dos, se actualiza en el otro.</li>
      </ul>
      <h3>La "fuente de verdad"</h3>
      <p>Acá viene lo importante. Para cada dato tenés que decidir cuál sistema manda, o sea, <b>cuál es la fuente de verdad</b>. Si dos sistemas dicen cosas distintas sobre el mismo teléfono, gana el que vos definiste como fuente de verdad para ese dato.</p>
      <p>No hay una respuesta única: el sistema de facturación suele ser la fuente de verdad para los datos de pago, y el CRM para los datos de contacto. Lo importante es <b>decidirlo a propósito</b>, no dejarlo al azar.</p>
      <div class="note"><b>Regla simple:</b> antes de prender un sync, preguntate "para este dato, ¿quién manda?". Esa respuesta es la fuente de verdad.</div>
    </div>`,
    hs:[{t:'Connect and use HubSpot data sync',u:'https://knowledge.hubspot.com/integrations/connect-and-use-hubspot-data-sync',k:'HubSpot KB'},{t:'Connect HubSpot and Salesforce',u:'https://knowledge.hubspot.com/salesforce/install-the-hubspot-salesforce-integration',k:'HubSpot KB'}],
    q:'¿Qué significa definir la "fuente de verdad" para un dato?',
    opts:[
      {t:'Decidir cuál sistema manda sobre ese dato, así, si hay diferencias, se sabe cuál gana.',ok:true,fb:'Exacto. La fuente de verdad resuelve los desacuerdos: para ese dato, manda el sistema que vos elegiste.'},
      {t:'Activar el sync siempre en dos vías para todos los datos.',ok:false,fb:'Dos vías es una dirección de sync, no la fuente de verdad. Igual tenés que decidir quién manda cuando hay diferencias.'},
      {t:'Que los dos sistemas tengan siempre exactamente la misma información, sin excepción.',ok:false,fb:'Eso es la meta del sync, pero no resuelve los conflictos. La fuente de verdad es quién decide cuando los datos no coinciden.'},
      {t:'Borrar el dato en uno de los dos sistemas para que no se repita.',ok:false,fb:'No se borra nada. Se decide cuál sistema es el que manda sobre ese dato.'},
    ]
  },
  {
    short:'Mapeo de campos',dur:'7 min',title:'Mapeo de campos y ediciones cruzadas',
    media:ph('1552664730-d307ca884978'),alt:'Equipo revisando la correspondencia de campos entre sistemas.',
    html:`<div class="prose">
      <p>Cada sistema le pone su propio nombre a los datos. En uno el casillero se llama "Teléfono", en el otro "Phone number", en otro "Tel. celular". Para que el sync sepa qué casillero va con cuál, se hace un <b>mapeo de campos</b>: una lista que dice "este campo de acá es el mismo que ese de allá".</p>
      <p>Si el mapeo está mal, pasa el desastre clásico: el celular termina cargado en el casillero del teléfono fijo, o la ciudad en el casillero del país. Por eso el mapeo es el corazón de una integración prolija.</p>
      <h3>¿Y si los dos lados editan el mismo dato?</h3>
      <p>Cuando el sync es de dos vías, puede pasar que alguien cambie el teléfono en el CRM y otra persona lo cambie distinto en el otro sistema, casi al mismo tiempo. Eso es un <b>conflicto</b>: dos versiones del mismo dato.</p>
      <p>El sync lo resuelve con la regla que definiste antes: gana la <b>fuente de verdad</b> para ese campo. El otro valor queda pisado. Por eso conviene que las personas sepan dónde se edita cada dato, para no estar peleando contra el sync.</p>
      <div class="note"><b>Para recordar:</b> mapeo = qué campo va con qué campo. Conflicto = los dos lados cambiaron lo mismo; gana la fuente de verdad.</div>
    </div>`,
    hs:[{t:'Understand your data sync field mappings',u:'https://knowledge.hubspot.com/integrations/understand-your-data-sync-field-mappings',k:'HubSpot KB'},{t:'Match records in data sync',u:'https://knowledge.hubspot.com/integrations/match-records-in-data-sync',k:'HubSpot KB'}],
    q:'En un sync de dos vías, dos personas cambian el mismo dato distinto, casi al mismo tiempo. ¿Cómo se resuelve?',
    opts:[
      {t:'Se guardan los dos valores en el mismo casillero, separados por una coma.',ok:false,fb:'No. Un campo guarda un solo valor; mezclar los dos ensucia el dato. El conflicto se resuelve eligiendo uno.'},
      {t:'El sync se rompe y hay que reconectarlo a mano.',ok:false,fb:'No se rompe. El sync está preparado para esto: aplica la regla de conflicto que definiste.'},
      {t:'Gana el valor del sistema que definiste como fuente de verdad para ese campo; el otro queda pisado.',ok:true,fb:'Correcto. Por eso conviene definir bien la fuente de verdad y que la gente sepa dónde se edita cada dato.'},
      {t:'Gana siempre el valor más largo de los dos.',ok:false,fb:'El largo no tiene nada que ver. Gana la fuente de verdad que vos definiste para ese campo.'},
    ]
  },
  {
    short:'Gobierno de datos',dur:'7 min',title:'Gobierno de datos: orden para todo el equipo',
    media:ph('1551434678-e076c223a692'),alt:'Persona ordenando y revisando datos en su computadora.',
    html:`<div class="prose">
      <p>Cuando varios equipos y varios sistemas escriben en el mismo CRM, hace falta poner reglas para que no se vuelva un caos. A esas reglas las llamamos <b>gobierno de datos</b>. Son tres cuidados básicos.</p>
      <ul>
        <li><b>Evitar duplicados:</b> el mismo cliente cargado dos veces rompe reportes y automatizaciones. El CRM ayuda a detectarlos y unirlos (fusionar), pero el mejor hábito sigue siendo buscar antes de crear.</li>
        <li><b>Datos obligatorios:</b> definir qué campos no pueden quedar vacíos (por ejemplo, el email). Así nadie carga una ficha a medias que después no sirve para nada.</li>
        <li><b>Alinear las etapas:</b> que marketing, ventas y atención usen las mismas etapas del ciclo y las entiendan igual. El paso clave es el de <b>MQL a SQL</b>.</li>
      </ul>
      <h3>De MQL a SQL, sin malentendidos</h3>
      <p>Un <b>MQL</b> es un interesado que marketing considera listo para que ventas lo contacte. Cuando ventas lo revisa y confirma que vale la pena, pasa a ser <b>SQL</b>. Si los dos equipos no se ponen de acuerdo en qué cuenta como "listo", marketing entrega contactos que ventas descarta, y empieza la pelea. Acordar esa definición es puro RevOps en acción.</p>
      <div class="note"><b>Cierre del programa:</b> integraciones prolijas y datos gobernados son lo que hace que el CRM sea confiable. Sin eso, hasta la mejor herramienta miente.</div>
    </div>`,
    hs:[{t:'Deduplicate records in HubSpot',u:'https://knowledge.hubspot.com/records/deduplication-of-records',k:'HubSpot KB'},{t:'Create and customize lifecycle stages',u:'https://knowledge.hubspot.com/object-settings/create-and-customize-lifecycle-stages',k:'HubSpot KB'}],
    q:'¿Por qué es clave que marketing y ventas acuerden cuándo un MQL pasa a SQL?',
    opts:[
      {t:'Porque si no comparten la misma definición, marketing entrega contactos que ventas descarta, y se generan peleas y datos poco confiables.',ok:true,fb:'Exacto. Acordar esa definición alinea a los dos equipos: eso es RevOps puesto en práctica.'},
      {t:'Porque MQL y SQL son lo mismo y hay que elegir un solo nombre.',ok:false,fb:'No son lo mismo: MQL lo califica marketing y SQL lo confirma ventas. Lo importante es acordar cuándo se pasa de uno al otro.'},
      {t:'Porque el CRM no funciona si no se usan esas dos etapas exactas.',ok:false,fb:'El CRM funciona igual; el punto no es técnico, es de acuerdo entre equipos sobre qué significa cada etapa.'},
      {t:'Porque así ventas puede ignorar a todos los contactos de marketing.',ok:false,fb:'Al revés: el acuerdo sirve para que ventas reciba contactos que valen la pena, no para ignorarlos.'},
    ]
  },
];

const LS='refindable_sesion_'+SESSION;
let state={unlocked:0,passed:{}};try{state=Object.assign(state,JSON.parse(localStorage.getItem(LS)||'{}'))}catch(e){}
const save=()=>{try{localStorage.setItem(LS,JSON.stringify(state))}catch(e){}};
function markDone(){try{const k='refindable_academy_progress_v1';const p=JSON.parse(localStorage.getItem(k)||'{}');p[SESSION]=true;localStorage.setItem(k,JSON.stringify(p));}catch(e){}}
let cur=Math.min(state.unlocked,UNITS.length-1), finished=UNITS.every((_,i)=>state.passed[i]);
const ulist=document.getElementById('ulist'),main=document.getElementById('main');
const check='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M20 6L9 17l-5-5"/></svg>';

function renderSide(){
  ulist.innerHTML='';
  UNITS.forEach((u,i)=>{
    const locked=i>state.unlocked;
    const it=document.createElement('div');
    it.className='uitem'+(i===cur&&!finished?' cur':'')+(state.passed[i]?' done':'')+(locked?' lock':'');
    it.innerHTML=`<span class="ix">${state.passed[i]?'✓':(i+1)}</span><div><div class="ut">${u.short}</div><div class="ud">${u.dur}</div></div>${locked?'<span class="lk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></svg></span>':''}`;
    if(!locked)it.addEventListener('click',()=>{cur=i;finished=false;renderAll();scrollTo({top:0,behavior:'smooth'});});
    ulist.appendChild(it);
  });
  const p=Object.keys(state.passed).filter(k=>state.passed[k]).length;
  document.getElementById('sideSub').textContent=`${p} de ${UNITS.length} unidades`;
  document.getElementById('sbar').style.width=(p/UNITS.length*100)+'%';
  document.getElementById('hbar').style.width=(p/UNITS.length*100)+'%';
  document.getElementById('hpct').textContent=Math.round(p/UNITS.length*100)+'%';
}
function renderMain(){
  if(finished){renderFinish();return;}
  const u=UNITS[cur],solved=!!state.passed[cur];
  const media=u.timeline?`<div class="hs" style="margin-top:0"><div class="ht"><span class="tag">Historia</span> Del Rolodex a la nube</div><div class="tl">${u.timeline}</div></div>`:`<div class="media"><img src="${u.media}" alt="${u.alt}" loading="lazy"></div>`;
  const hs=u.hs.map(r=>`<a class="r" href="${r.u}" target="_blank" rel="noopener"><span>${r.t}</span><span class="src">${r.k} ${ext}</span></a>`).join('');
  const opts=u.opts.map((o,j)=>`<button class="opt" data-j="${j}" data-ok="${o.ok?1:0}"><span class="mk">${String.fromCharCode(65+j)}</span><span>${o.t}</span></button>`).join('');
  main.innerHTML=`
    <div class="crumb">Unidad ${cur+1} de ${UNITS.length}</div>
    <h1>${u.title}</h1>
    <div class="umeta"><span class="m"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 2"/></svg>${u.dur} de lectura</span><span class="m">Video próximamente</span></div>
    ${media}
    ${u.html}
    <div class="hs"><div class="ht"><span class="tag">HubSpot</span> Material para esta unidad</div>${hs}</div>
    <div class="quiz"><div class="ql">Repaso rápido</div><div class="q">${u.q}</div><div class="opts">${opts}</div><div class="fb"></div></div>
    <div class="nav-foot">
      <button class="btn" id="prevBtn" ${cur===0?'disabled':''}><svg viewBox="0 0 24 24" fill="currentColor"><path d="M15 18l-6-6 6-6"/></svg> Anterior</button>
      ${solved?'':'<span class="lockhint" id="lh"><svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></svg> Respondé el repaso para continuar</span>'}
      <button class="btn pri" id="nextBtn" ${solved?'':'disabled'}>${cur<UNITS.length-1?'Siguiente':'Terminar'} <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 6l6 6-6 6"/></svg></button>
    </div>`;
  const fb=main.querySelector('.fb');
  main.querySelectorAll('.opt').forEach(opt=>{
    if(solved){opt.disabled=true;if(opt.dataset.ok==='1')opt.classList.add('correct');}
    opt.addEventListener('click',()=>{
      if(state.passed[cur])return;
      const ok=opt.dataset.ok==='1',o=u.opts[+opt.dataset.j];
      main.querySelectorAll('.opt').forEach(x=>x.classList.remove('wrong'));
      if(ok){opt.classList.add('correct');main.querySelectorAll('.opt').forEach(x=>x.disabled=true);
        fb.className='fb ok show';fb.innerHTML='<b>Correcto.</b> '+o.fb;
        state.passed[cur]=true;if(state.unlocked===cur)state.unlocked=cur+1;save();
        document.getElementById('nextBtn').disabled=false;const lh=document.getElementById('lh');if(lh)lh.remove();renderSide();
      }else{opt.classList.add('wrong');fb.className='fb no show';fb.innerHTML='<b>Todavía no.</b> '+o.fb+' Probá de nuevo.';}
    });
  });
  const pb=document.getElementById('prevBtn');if(pb)pb.addEventListener('click',()=>{if(cur>0){cur--;renderAll();scrollTo({top:0,behavior:'smooth'});}});
  document.getElementById('nextBtn').addEventListener('click',()=>{
    if(!state.passed[cur])return;
    if(cur<UNITS.length-1){cur++;renderAll();scrollTo({top:0,behavior:'smooth'});}
    else{finished=true;markDone();renderAll();scrollTo({top:0,behavior:'smooth'});}
  });
}
function renderFinish(){
  main.innerHTML=`<div class="done-card">
    <div class="k">Programa completo</div>
    <h1 class="serif">¡Felicitaciones, terminaste el programa!</h1>
    <p>Llegaste a la última clase. Ya entendés qué es RevOps, la diferencia entre integraciones nativas y por API, la dirección del sync y la fuente de verdad, el mapeo de campos y el gobierno de datos. Con eso cerrás el recorrido completo de la academia.</p>
    <p style="font-weight:600;color:var(--ink)">Quedate con esto: un CRM vale lo que valen sus datos. Equipos alineados e integraciones prolijas son lo que lo vuelven confiable.</p>
    <div class="actions">
      <a class="btn pri" href="${NEXT}">Rendir el examen final <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 6l6 6-6 6"/></svg></a>
      <a class="btn" href="${EXAM}">Rendir el examen avanzado</a>
      <a class="btn" href="./">Volver a la academia</a>
    </div>
  </div>`;
}
function renderAll(){renderSide();renderMain();}
renderAll();
</script>
</body>
