<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sesión 1 · ¿Qué es un CRM? + Navegación HubSpot | Refindable Academy</title>
<meta name="description" content="Aprendé qué es un CRM, de dónde viene, cómo guarda la información y cómo moverte. Formato lección: contenido visual, recursos de HubSpot y un repaso por unidad.">
<meta name="theme-color" content="#ffffff">
<link rel="icon" type="image/png" href="https://refindable.com/wp-content/uploads/2022/05/cropped-Favicon-32x32.png">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4f5f1;--surface:#fff;--surface2:#f8f9f6;--tint:#eef3fb;
    --ink:#1c2230;--muted:#576070;--faint:#8b93a1;--line:#e7e8e3;--line2:#dadbd5;
    --pri:#2563eb;--pri-d:#1d4ed8;--pri-soft:#e8eefe;
    --ok:#0d9f6e;--ok-s:#e6f6ef;--bad:#dc2626;--bad-s:#fdeaea;--hs:#ff7a59;--hs-s:#fff2ee;--hs-b:#ffd9cd;
    --shadow-sm:0 1px 2px rgba(28,34,48,.05),0 2px 6px rgba(28,34,48,.04);
    --shadow:0 8px 22px rgba(28,34,48,.09);--shadow-lg:0 18px 40px rgba(28,34,48,.13);
    --r:16px;--ease:cubic-bezier(.4,0,.2,1);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.65;-webkit-tap-highlight-color:transparent}
  a{color:var(--pri);text-decoration:none}
  img{display:block;max-width:100%}
  :focus-visible{outline:3px solid var(--pri);outline-offset:2px;border-radius:6px}
  .ic{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

  header{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .hbar{display:flex;align-items:center;gap:14px;height:58px;max-width:1240px;margin:0 auto;padding:0 22px}
  .back{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-weight:600;font-size:14px}
  .back:hover{color:var(--ink)}.back svg{width:16px;height:16px}
  .htitle{font-weight:700;font-size:14.5px;padding-left:14px;border-left:1px solid var(--line);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hprog{margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0}
  .hprog .pb{width:120px;height:7px;background:var(--line);border-radius:4px;overflow:hidden}
  .hprog .pb i{display:block;height:100%;width:0;background:var(--ok);border-radius:4px;transition:width .5s var(--ease)}
  .hprog .pl{font-size:13px;font-weight:700;color:var(--muted)}

  .layout{max-width:1240px;margin:0 auto;padding:26px 22px 70px;display:grid;grid-template-columns:300px 1fr;gap:30px;align-items:start}

  /* sidebar: course outline */
  .side{position:sticky;top:80px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm);overflow:hidden}
  .side .sh{padding:18px 20px;border-bottom:1px solid var(--line)}
  .side .sh .t{font-weight:800;font-size:15px}
  .side .sh .s{font-size:12.5px;color:var(--muted);margin-top:2px}
  .side .sh .pb{height:6px;background:var(--line);border-radius:4px;margin-top:12px;overflow:hidden}
  .side .sh .pb i{display:block;height:100%;width:0;background:var(--ok);border-radius:4px;transition:width .5s var(--ease)}
  .ulist{padding:8px}
  .uitem{display:flex;align-items:center;gap:12px;padding:12px 12px;border-radius:11px;cursor:pointer;transition:background .15s;border:1px solid transparent}
  .uitem:hover{background:var(--surface2)}
  .uitem.cur{background:var(--pri-soft);border-color:#cdddfd}
  .uitem.lock{opacity:.55;cursor:not-allowed}
  .uitem .ix{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--line2);display:grid;place-items:center;font-weight:700;font-size:13px;color:var(--faint);flex-shrink:0}
  .uitem.cur .ix{border-color:var(--pri);color:var(--pri)}
  .uitem.done .ix{background:var(--ok);border-color:var(--ok);color:#fff}
  .uitem .ut{font-size:14px;font-weight:600;line-height:1.3}
  .uitem .ud{font-size:11.5px;color:var(--faint);font-weight:500;margin-top:1px}
  .uitem .lk{margin-left:auto;color:var(--faint)}.uitem .lk svg{width:15px;height:15px}

  /* main content */
  .main{min-width:0}
  .crumb{font-size:12.5px;font-weight:700;color:var(--pri);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
  .main h1{font-size:clamp(26px,3.4vw,38px);font-weight:800;letter-spacing:-.02em;line-height:1.12;margin-bottom:8px}
  .umeta{font-size:13px;color:var(--faint);font-weight:600;margin-bottom:22px;display:flex;gap:16px;flex-wrap:wrap}
  .umeta .m{display:flex;align-items:center;gap:6px}.umeta .ic{width:14px;height:14px;stroke:var(--faint)}

  /* media area (Coursera-style) */
  .media{border-radius:var(--r);overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow);margin-bottom:24px;background:var(--surface)}
  .media.photo{aspect-ratio:16/8;position:relative}
  .media.photo img{width:100%;height:100%;object-fit:cover}
  .media.photo .cap{position:absolute;left:0;right:0;bottom:0;padding:26px 22px 14px;background:linear-gradient(transparent,rgba(10,14,25,.8));color:#fff;font-weight:600;font-size:14px}

  /* fake product window (mockups = "capturas") */
  .win{background:var(--surface)}
  .win .bar{display:flex;align-items:center;gap:7px;padding:11px 14px;background:var(--surface2);border-bottom:1px solid var(--line)}
  .win .bar .d{width:11px;height:11px;border-radius:50%}
  .win .bar .d1{background:#ff5f57}.win .bar .d2{background:#febc2e}.win .bar .d3{background:#28c840}
  .win .bar .url{margin-left:10px;font-size:12px;color:var(--faint);background:#fff;border:1px solid var(--line);border-radius:6px;padding:3px 10px}
  .win .scr{padding:20px}

  /* mock: contact record */
  .mc{display:grid;grid-template-columns:1fr 1.2fr;gap:18px}
  .mc .lft{text-align:center;border-right:1px solid var(--line);padding-right:18px}
  .mc .av{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#60a5fa,#2563eb);color:#fff;display:grid;place-items:center;font-weight:800;font-size:24px;margin:0 auto 10px}
  .mc .nm{font-weight:800;font-size:17px}.mc .rl{font-size:13px;color:var(--muted)}
  .mc .pillrow{display:flex;gap:6px;justify-content:center;margin-top:10px;flex-wrap:wrap}
  .mc .pill{font-size:11px;font-weight:700;padding:4px 9px;border-radius:100px;background:var(--ok-s);color:var(--ok)}
  .mc .props .pr{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--line);font-size:13.5px}
  .mc .props .pr .k{color:var(--faint);font-weight:600}.mc .props .pr .v{font-weight:600}
  .mc .props .lbl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--faint);margin-bottom:4px}

  /* mock: nav */
  .mn{display:flex;gap:16px}
  .mn .menu{width:180px;background:var(--surface2);border:1px solid var(--line);border-radius:10px;padding:8px;flex-shrink:0}
  .mn .menu .mi{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:8px;font-size:13.5px;font-weight:600;color:var(--muted)}
  .mn .menu .mi.on{background:#fff;color:var(--pri);box-shadow:var(--shadow-sm)}
  .mn .menu .mi .e{font-size:15px}
  .mn .canvas{flex:1;border:1px dashed var(--line2);border-radius:10px;display:grid;place-items:center;color:var(--faint);font-size:13px;min-height:150px;text-align:center;padding:16px}
  .mn .search{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:9px 12px;color:var(--faint);font-size:13px;margin-bottom:12px}
  .mn .search svg{width:15px;height:15px;stroke:var(--faint);fill:none;stroke-width:2}

  /* mock: form */
  .mf{max-width:420px;margin:0 auto}
  .mf .fld{margin-bottom:12px}
  .mf label{display:block;font-size:12.5px;font-weight:700;color:var(--muted);margin-bottom:5px}
  .mf .inp{height:38px;background:var(--surface2);border:1px solid var(--line);border-radius:8px;display:flex;align-items:center;padding:0 12px;font-size:13.5px;color:var(--ink)}
  .mf .inp.ph{color:var(--faint)}
  .mf .save{margin-top:6px;background:var(--pri);color:#fff;text-align:center;padding:11px;border-radius:9px;font-weight:700;font-size:14px}
  .mf .hint{font-size:12px;color:var(--faint);margin-top:8px;display:flex;gap:7px;align-items:flex-start}

  /* timeline */
  .tl{margin:4px 0}
  .tl .ev{position:relative;padding:0 0 18px 26px;border-left:2px solid var(--line2);margin-left:6px}
  .tl .ev:last-child{border-left-color:transparent;padding-bottom:0}
  .tl .ev::before{content:'';position:absolute;left:-8px;top:2px;width:14px;height:14px;border-radius:50%;background:var(--pri);box-shadow:0 0 0 3px var(--pri-soft)}
  .tl .ev .yr{font-weight:800;color:var(--pri);font-size:14.5px}
  .tl .ev .ti{font-weight:700;font-size:15px;margin:1px 0 2px}
  .tl .ev p{margin:0;font-size:14px;color:var(--muted);line-height:1.5}

  /* prose */
  .prose p{font-size:16.5px;margin-bottom:15px}
  .prose h3{font-size:19px;font-weight:800;margin:24px 0 10px;letter-spacing:-.01em}
  .prose ul{list-style:none;margin:4px 0 16px}
  .prose ul li{position:relative;padding:6px 0 6px 26px;font-size:16px}
  .prose ul li::before{content:'';position:absolute;left:3px;top:15px;width:7px;height:7px;border-radius:50%;background:var(--pri)}
  .prose b,.prose strong{font-weight:700}
  .note{background:var(--surface2);border:1px solid var(--line);border-left:4px solid var(--pri);border-radius:0 12px 12px 0;padding:14px 18px;margin:18px 0;font-size:15.5px}
  .note b{font-weight:700}

  /* hubspot resources */
  .hsbox{background:var(--hs-s);border:1px solid var(--hs-b);border-radius:14px;padding:18px 20px;margin:24px 0}
  .hsbox .ht{display:flex;align-items:center;gap:10px;font-weight:800;font-size:14px;color:#c0492c;margin-bottom:12px}
  .hsbox .ht .lg{width:24px;height:24px;border-radius:6px;background:var(--hs);display:grid;place-items:center;color:#fff;font-size:13px;font-weight:800}
  .hsbox a.res{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--hs-b);border-radius:10px;padding:12px 14px;margin-bottom:8px;color:var(--ink);font-weight:600;font-size:14px;transition:transform .12s,box-shadow .15s}
  .hsbox a.res:last-child{margin-bottom:0}
  .hsbox a.res:hover{transform:translateX(3px);box-shadow:var(--shadow-sm)}
  .hsbox a.res .e{font-size:18px}
  .hsbox a.res .meta{margin-left:auto;font-size:11.5px;color:var(--faint);font-weight:600;display:flex;align-items:center;gap:8px}
  .hsbox a.res .kind{background:var(--hs-s);color:#c0492c;padding:2px 8px;border-radius:100px;font-size:10.5px}

  /* quiz */
  .quiz{margin-top:26px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:24px}
  .quiz .ql{display:inline-flex;align-items:center;gap:8px;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:12px}
  .quiz .q{font-size:17.5px;font-weight:700;line-height:1.4;margin-bottom:16px}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;gap:12px;align-items:flex-start;text-align:left;background:var(--surface);border:1.5px solid var(--line2);border-radius:12px;padding:14px 16px;font-family:inherit;font-size:15.5px;color:var(--ink);cursor:pointer;transition:border-color .15s,background .15s;line-height:1.4}
  .opt:hover:not(:disabled){border-color:var(--pri);background:var(--pri-soft)}
  .opt .mk{width:25px;height:25px;border-radius:7px;background:var(--surface2);border:1px solid var(--line2);display:grid;place-items:center;font-weight:800;font-size:12.5px;color:var(--muted);flex-shrink:0}
  .opt.correct{border-color:var(--ok);background:var(--ok-s)}.opt.correct .mk{background:var(--ok);border-color:var(--ok);color:#fff}
  .opt.wrong{border-color:var(--bad);background:var(--bad-s)}.opt.wrong .mk{background:var(--bad);border-color:var(--bad);color:#fff}
  .opt:disabled{cursor:default}
  .fb{margin-top:12px;border-radius:11px;padding:13px 15px;font-size:14.5px;line-height:1.55;display:none}
  .fb.show{display:block}.fb.ok{background:var(--ok-s);color:#0a7a55}.fb.no{background:var(--bad-s);color:#a81c1c}.fb b{font-weight:800}

  .nav-foot{display:flex;justify-content:space-between;align-items:center;margin-top:26px;gap:12px}
  .btn{display:inline-flex;align-items:center;gap:9px;font-family:inherit;font-weight:700;font-size:15px;padding:13px 22px;border-radius:12px;cursor:pointer;border:1px solid var(--line2);background:var(--surface);color:var(--ink)}
  .btn:disabled{opacity:.45;cursor:not-allowed}
  .btn.pri{background:var(--pri);color:#fff;border-color:var(--pri);box-shadow:0 6px 16px rgba(37,99,235,.26)}
  .btn.pri:not(:disabled):hover{background:var(--pri-d)}
  .btn svg{width:16px;height:16px;fill:currentColor}
  .lockhint{font-size:13px;color:var(--faint);font-weight:600;display:flex;align-items:center;gap:8px}
  .lockhint svg{width:15px;height:15px;stroke:var(--faint);fill:none;stroke-width:2}

  .done-card{text-align:center;background:linear-gradient(180deg,#fff,var(--surface2));border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:40px 30px}
  .done-card .tro{font-size:52px;margin-bottom:6px}
  .done-card h1{margin-bottom:8px}.done-card p{color:var(--muted);max-width:52ch;margin:0 auto 8px;font-size:16px}
  .done-card .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:22px}

  @media(max-width:900px){
    .layout{grid-template-columns:1fr;gap:18px}
    .side{position:static;order:-1}
    .ulist{display:flex;overflow-x:auto;padding:10px;gap:8px}
    .uitem{flex-direction:column;min-width:120px;text-align:center;align-items:center}
    .uitem .lk,.uitem .ud{display:none}.uitem .ut{font-size:12.5px}
    .mc{grid-template-columns:1fr}.mc .lft{border-right:none;border-bottom:1px solid var(--line);padding:0 0 16px}
    .mn{flex-direction:column}.mn .menu{width:100%}
    .htitle{display:none}
  }
  @media (prefers-reduced-motion:reduce){*{transition-duration:.01ms!important}}
</style>
</head>
<body>
<header>
  <div class="hbar">
    <a class="back" href="./"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg> Academia</a>
    <span class="htitle">Sesión 1 · ¿Qué es un CRM?</span>
    <div class="hprog"><div class="pb"><i id="hbar"></i></div><span class="pl" id="hpct">0%</span></div>
  </div>
</header>

<div class="layout">
  <aside class="side">
    <div class="sh">
      <div class="t">Contenido de la sesión</div>
      <div class="s" id="sideSub">0 de 5 unidades</div>
      <div class="pb"><i id="sbar"></i></div>
    </div>
    <div class="ulist" id="ulist"></div>
  </aside>
  <main class="main" id="main"></main>
</div>

<script>
const SESSION='s1', NEXT='session2-trainees.html', EXAM='examen-fundamentos.html';

/* media renderers */
const MEDIA={
  photo:(src,cap)=>`<div class="media photo"><img src="${src}" alt="${cap}" loading="lazy">${cap?`<div class="cap">${cap}</div>`:''}</div>`,
  contact:()=>`<div class="media win"><div class="bar"><span class="d d1"></span><span class="d d2"></span><span class="d d3"></span><span class="url">CRM ▸ Contactos ▸ Ana Gómez</span></div><div class="scr"><div class="mc">
      <div class="lft"><div class="av">AG</div><div class="nm">Ana Gómez</div><div class="rl">Gerente de Compras</div><div class="pillrow"><span class="pill">Cliente</span></div></div>
      <div class="rgt"><div class="props"><div class="lbl">Información (propiedades)</div>
        <div class="pr"><span class="k">Email</span><span class="v">ana@empresa.com</span></div>
        <div class="pr"><span class="k">Teléfono</span><span class="v">+54 11 5555-1234</span></div>
        <div class="pr"><span class="k">Empresa</span><span class="v">Distribuidora Sur</span></div>
        <div class="pr"><span class="k">Ciudad</span><span class="v">Rosario</span></div>
        <div class="pr" style="border:none"><span class="k">Origen</span><span class="v">Formulario web</span></div>
      </div></div></div></div></div>`,
  nav:()=>`<div class="media win"><div class="bar"><span class="d d1"></span><span class="d d2"></span><span class="d d3"></span><span class="url">app.tu-crm.com</span></div><div class="scr"><div class="mn">
      <div class="menu">
        <div class="mi on"><span class="e">📇</span> Contactos</div>
        <div class="mi"><span class="e">🏢</span> Empresas</div>
        <div class="mi"><span class="e">💼</span> Negocios</div>
        <div class="mi"><span class="e">🎫</span> Tickets</div>
        <div class="mi"><span class="e">📣</span> Marketing</div>
        <div class="mi"><span class="e">📊</span> Reportes</div>
      </div>
      <div class="cv" style="flex:1">
        <div class="search"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg> Buscar cualquier contacto, empresa o negocio…</div>
        <div class="canvas">Acá aparece tu lista de contactos.<br>Desde el menú de la izquierda llegás a todo en 1 clic.</div>
      </div></div></div></div>`,
  form:()=>`<div class="media win"><div class="bar"><span class="d d1"></span><span class="d d2"></span><span class="d d3"></span><span class="url">Crear contacto</span></div><div class="scr"><div class="mf">
      <div class="fld"><label>Nombre</label><div class="inp">Ana</div></div>
      <div class="fld"><label>Apellido</label><div class="inp">Gómez</div></div>
      <div class="fld"><label>Email <span style="color:var(--pri)">(la clave para no duplicar)</span></label><div class="inp">ana@empresa.com</div></div>
      <div class="fld"><label>Empresa</label><div class="inp ph">Buscá y asociá una empresa…</div></div>
      <div class="save">Guardar contacto</div>
      <div class="hint">💡 Antes de guardar, el CRM revisa si ese email ya existe para no crear un duplicado.</div>
  </div></div></div>`,
  timeline:(html)=>`<div class="media win"><div class="bar"><span class="d d1"></span><span class="d d2"></span><span class="d d3"></span><span class="url">La historia del CRM</span></div><div class="scr"><div class="tl">${html}</div></div></div>`
};

const TL=`
  <div class="ev"><div class="yr">1956</div><div class="ti">El Rolodex 🗂️</div><p>Un tarjetero giratorio de escritorio. Cada tarjeta, un contacto. Durante décadas fue el "CRM" del mundo entero.</p></div>
  <div class="ev"><div class="yr">Años 80</div><div class="ti">Datos en la computadora 💾</div><p>Las empresas empiezan a guardar y analizar datos de clientes con software. Ya no alcanza con anotar: ahora se usa la info para decidir.</p></div>
  <div class="ev"><div class="yr">1986</div><div class="ti">Dos vendedores y una servilleta 🍽️</div><p>Pat Sullivan y Mike Muhney se preguntan en un restaurante qué necesitarían ellos para vender mejor, y lo dibujan ahí mismo. Nace el primer software para gestionar contactos en una PC.</p></div>
  <div class="ev"><div class="yr">Años 90</div><div class="ti">Aparece el nombre "CRM" 🏷️</div><p>Se populariza el término Customer Relationship Management (gestión de la relación con el cliente) y los sistemas se vuelven más completos.</p></div>
  <div class="ev"><div class="yr">1999</div><div class="ti">El CRM se va a la nube ☁️</div><p>Deja de vivir instalado en tu computadora y pasa a internet. Entrás desde cualquier lado, sin instalar nada. Eso lo puso al alcance de empresas chicas.</p></div>
  <div class="ev"><div class="yr">Hoy</div><div class="ti">CRM con automatización e IA 🤖</div><p>La misma idea de 1956, pero ahora con tareas que se hacen solas y asistentes que sugieren el próximo paso.</p></div>`;

const UNITS=[
  {
    short:'¿Qué es un CRM?', dur:'6 min',
    title:'¿Qué es un CRM?',
    media:MEDIA.photo('https://images.unsplash.com/photo-1556761175-5973dc0f32e7?auto=format&fit=crop&w=1200&q=70','Un equipo trabajando sobre la misma información de clientes.'),
    html:`<div class="prose">
      <p>Vamos directo al grano. <b>CRM</b> quiere decir <i>Customer Relationship Management</i>, o sea: gestión de la relación con los clientes. Pero te lo digo más fácil.</p>
      <p>Pensá en el almacenero del barrio. Conoce a cada cliente por su nombre, sabe qué compra y a quién le puede fiar. Todo eso lo tiene en la cabeza, y funciona bárbaro… hasta que el negocio crece, se suma gente al equipo y ya nadie se acuerda de todo.</p>
      <p>Un CRM es justamente eso, pero para un equipo entero y sin depender de la memoria de nadie: <b>un solo lugar donde tu empresa guarda todo sobre cada cliente, y donde todos lo pueden ver.</b></p>
      <h3>¿Qué guarda adentro?</h3>
      <ul>
        <li>Quién es cada cliente y cómo contactarlo.</li>
        <li>Qué se habló con él y cuándo (llamadas, mails, reuniones).</li>
        <li>En qué anda: si está por comprar, si ya es cliente, si tuvo un problema.</li>
      </ul>
      <div class="note"><b>Ojo con esto:</b> un CRM no vende solo ni reemplaza a las personas. Las ayuda a trabajar mejor, dándoles memoria y orden.</div>
    </div>`,
    hs:[
      {e:'📘',t:'Cómo se organiza tu base de datos en el CRM',u:'https://knowledge.hubspot.com/get-started/manage-your-crm-database',k:'HubSpot KB'},
      {e:'🚀',t:'Primeros pasos en HubSpot',u:'https://knowledge.hubspot.com/get-started',k:'HubSpot KB'},
    ],
    q:'¿Cuál es la mejor forma de explicar qué es un CRM?',
    opts:[
      {t:'Una planilla de Excel un poco más linda con los datos de los clientes.', ok:false, fb:'Un Excel guarda datos sueltos. Un CRM guarda la relación completa con cada cliente y la comparte con todo el equipo. No es lo mismo.'},
      {t:'Un único lugar, compartido por el equipo, donde vive toda la información y la historia de cada cliente.', ok:true, fb:'Eso es. La clave está en "compartido" y en "la historia": cualquiera del equipo puede atender a un cliente sin empezar de cero.'},
      {t:'Un programa que vende solo, sin que intervenga ninguna persona.', ok:false, fb:'No. El CRM ayuda a las personas a vender mejor, pero la relación y las decisiones siguen siendo humanas.'},
      {t:'Una red social para empresas.', ok:false, fb:'No es una red social. Es la base de datos central de tus clientes y de todo lo que pasó con ellos.'},
    ]
  },
  {
    short:'De dónde viene', dur:'5 min',
    title:'De dónde salió el CRM (y por qué te conviene saberlo)',
    media:MEDIA.timeline(TL),
    html:`<div class="prose">
      <p>Esto no lo inventó una empresa de un día para el otro. Es una idea que viene evolucionando hace más de 70 años, siempre detrás de lo mismo: no perder de vista al cliente.</p>
      <p>Mirá la línea de tiempo de arriba. Lo importante no son las fechas, es el <b>hilo</b>: del cartón al Rolodex, del Rolodex a la computadora, y de ahí a la nube. La herramienta cambió un montón; la necesidad es siempre la misma.</p>
      <div class="note">Por eso en este curso te enseñamos a <b>entender la idea</b> antes que los botones. Los botones cambian cada año; la idea, no. Si entendés el "para qué", te adaptás a cualquier sistema.</div>
      <p>Y hay un detalle lindo: el primer software de contactos nació de dos vendedores cansados de olvidarse de sus clientes. No bajó de una torre de ingenieros. Salió de gente que estaba en la calle vendiendo.</p>
    </div>`,
    hs:[
      {e:'📖',t:'Historia del CRM (referencia general)',u:'https://en.wikipedia.org/wiki/Customer_relationship_management',k:'Wikipedia'},
      {e:'🎓',t:'Getting Started with HubSpot CRM',u:'https://academy.hubspot.com/lessons/getting-started-with-hubspot-crm',k:'HubSpot Academy'},
    ],
    q:'Si las herramientas cambiaron tanto (del Rolodex a la nube), ¿por qué conviene enfocarse en entender la idea del CRM?',
    opts:[
      {t:'Porque la idea de fondo (no perder de vista al cliente) sigue igual, mientras las pantallas y los botones cambian todo el tiempo.', ok:true, fb:'Exacto. Si entendés el para qué, manejás cualquier CRM aunque cambie la herramienta.'},
      {t:'Porque los botones son aburridos.', ok:false, fb:'No es por gusto. Es algo más práctico: la idea perdura y los botones cambian.'},
      {t:'Porque hoy los CRM ya no tienen botones.', ok:false, fb:'Claro que tienen. El punto es que la interfaz cambia seguido y la idea de fondo no.'},
      {t:'Porque la historia no sirve para nada.', ok:false, fb:'Al contrario: entender de dónde viene te ayuda a entender por qué funciona como funciona.'},
    ]
  },
  {
    short:'Cómo guarda los datos', dur:'7 min',
    title:'Cómo guarda la información: contactos, empresas y datos',
    media:MEDIA.contact(),
    html:`<div class="prose">
      <p>Arriba tenés una ficha de contacto, parecida a la que vas a ver en cualquier CRM. Usémosla para entender tres palabras que vas a escuchar todo el tiempo.</p>
      <ul>
        <li><b>Contacto:</b> una persona. En el ejemplo, Ana Gómez.</li>
        <li><b>Empresa:</b> el lugar donde trabaja esa persona. Acá, Distribuidora Sur. Una empresa puede tener varios contactos.</li>
        <li><b>Propiedad:</b> cada dato de la ficha (email, teléfono, ciudad, origen). Cada dato en su casillero.</li>
      </ul>
      <p>¿Por qué importa poner cada dato en su casillero? Porque después vas a querer buscar cosas como "todos mis clientes de Rosario" o "los que llegaron por un formulario". Si los datos están ordenados, eso lo resolvés en segundos. Si están sueltos en una nota, no.</p>
      <div class="note"><b>Regla simple:</b> el dato va donde pertenece. El email es de la persona; la dirección de la oficina es de la empresa.</div>
    </div>`,
    hs:[
      {e:'🎓',t:'The Anatomy of Your CRM (objetos y propiedades)',u:'https://academy.hubspot.com/lessons/anatomy-of-your-crm',k:'HubSpot Academy'},
      {e:'📘',t:'Centro de ayuda del CRM',u:'https://knowledge.hubspot.com/crm',k:'HubSpot KB'},
    ],
    q:'Querés guardar la ciudad de la oficina central de una empresa. ¿Dónde corresponde ese dato?',
    opts:[
      {t:'En una propiedad de la empresa.', ok:true, fb:'Bien. La dirección de la oficina describe a la empresa, así que va en la empresa. Todos sus contactos quedan asociados a ese dato.'},
      {t:'En el nombre del contacto.', ok:false, fb:'No. Mezclar datos en el nombre ensucia todo y después no podés buscar ni ordenar bien.'},
      {t:'En una nota suelta.', ok:false, fb:'Una nota no se puede filtrar ni buscar. Para eso están las propiedades, en el objeto correcto (la empresa).'},
      {t:'En el teléfono de la persona.', ok:false, fb:'El teléfono es para el teléfono. Cada dato tiene su casillero; la ciudad de la oficina va en la empresa.'},
    ]
  },
  {
    short:'Cómo moverte', dur:'5 min',
    title:'Cómo moverte por el CRM sin perderte',
    media:MEDIA.nav(),
    html:`<div class="prose">
      <p>La pantalla puede parecer grande al principio, pero el mapa es simple. Fijate la captura de arriba.</p>
      <ul>
        <li>Desde el <b>menú de la izquierda</b> llegás a todo: Contactos, Empresas, Negocios, y las herramientas de marketing, ventas y reportes.</li>
        <li>La <b>barra de búsqueda</b> te encuentra cualquier registro al instante. Si buscás a una persona, empezá por ahí.</li>
        <li>Las <b>vistas y filtros</b> dentro de cada sección responden casi cualquier pregunta sin que tengas que exportar nada a Excel.</li>
      </ul>
      <p>No hace falta que te aprendas dónde está cada cosa de memoria. Con la búsqueda y el menú de la izquierda ya te movés por el 90% del CRM.</p>
    </div>`,
    hs:[
      {e:'📘',t:'Recorrido inicial por tu cuenta',u:'https://knowledge.hubspot.com/get-started',k:'HubSpot KB'},
    ],
    q:'Tu jefe te pide "la lista de todos los negocios que cierran este mes". ¿Cuál es la forma más eficiente de obtenerla?',
    opts:[
      {t:'Buscar negocio por negocio en la barra de búsqueda.', ok:false, fb:'La búsqueda sirve para encontrar UN registro, no para armar listas con condiciones. No es el camino.'},
      {t:'Ir a la sección de Negocios y aplicar un filtro por fecha de cierre.', ok:true, fb:'Eso. Las vistas con filtros son la herramienta justa: rápidas, precisas y siempre actualizadas.'},
      {t:'Exportar todo a Excel y filtrar ahí.', ok:false, fb:'Te da una foto vieja y te saca del CRM. Si lo podés resolver con un filtro adentro, mejor.'},
      {t:'Pedirle a otra persona que lo haga.', ok:false, fb:'Es algo que resolvés vos en segundos con un filtro. No hace falta delegarlo.'},
    ]
  },
  {
    short:'Tu primer contacto', dur:'6 min',
    title:'Tu primera tarea: cargar un contacto bien',
    media:MEDIA.form(),
    html:`<div class="prose">
      <p>Llegó un interesado y lo tenés que cargar. Parece simple, y lo es, pero hay un detalle que separa un CRM ordenado de uno lleno de basura.</p>
      <h3>El paso que casi todos se saltean</h3>
      <p>Antes de crear el contacto, <b>buscalo primero</b> por email o nombre. Capaz ya está cargado. Si existe, lo actualizás; no creás uno nuevo. Así evitás los duplicados, que son el problema número uno de cualquier base de datos.</p>
      <h3>Después, cargá bien</h3>
      <ul>
        <li>Completá el <b>email</b>: es la huella que usa el CRM para no duplicar.</li>
        <li><b>Asociá</b> el contacto a su empresa.</li>
        <li>Dejá registrada la <b>primera actividad</b> (una nota de cómo llegó, por ejemplo).</li>
      </ul>
      <div class="note">Un contacto bien cargado hoy es un reporte confiable dentro de seis meses. Vale la pena el minuto extra.</div>
    </div>`,
    hs:[
      {e:'📘',t:'Cómo crear contactos (a mano, importando o por formularios)',u:'https://knowledge.hubspot.com/records/create-contacts',k:'HubSpot KB'},
    ],
    q:'Vas a cargar un nuevo interesado. ¿Cuál es el primer paso para no ensuciar el CRM?',
    opts:[
      {t:'Crearlo directo; si hay un duplicado, ya lo arreglará alguien después.', ok:false, fb:'Así nacen las bases sucias. "Después lo arreglo" casi nunca pasa, y los duplicados rompen reportes y automatizaciones.'},
      {t:'Buscarlo primero por email o nombre; si ya existe, actualizar ese registro en vez de crear otro.', ok:true, fb:'Correcto. Buscar antes de crear es el hábito que mantiene el CRM limpio.'},
      {t:'Crear siempre una empresa nueva por las dudas.', ok:false, fb:'Eso genera empresas duplicadas. Si la empresa ya existe, asociá el contacto a esa.'},
      {t:'Anotarlo en un papel para cargarlo más tarde.', ok:false, fb:'Si no entra al CRM, no se puede seguir ni reportar. Cargalo bien, ahora.'},
    ]
  },
];

/* ---------- engine ---------- */
const LS='refindable_sesion_'+SESSION;
let state={unlocked:0,passed:{}}; try{state=Object.assign(state,JSON.parse(localStorage.getItem(LS)||'{}'))}catch(e){}
const save=()=>{try{localStorage.setItem(LS,JSON.stringify(state))}catch(e){}};
function markDone(){try{const k='refindable_academy_progress_v1';const p=JSON.parse(localStorage.getItem(k)||'{}');p[SESSION]=true;localStorage.setItem(k,JSON.stringify(p));}catch(e){}}
let cur=Math.min(state.unlocked,UNITS.length-1);
let finished=UNITS.every((_,i)=>state.passed[i]);

const ulist=document.getElementById('ulist'), main=document.getElementById('main');

function renderSide(){
  ulist.innerHTML='';
  UNITS.forEach((u,i)=>{
    const locked=i>state.unlocked;
    const it=document.createElement('div');
    it.className='uitem'+(i===cur&&!finished?' cur':'')+(state.passed[i]?' done':'')+(locked?' lock':'');
    it.innerHTML=`<span class="ix">${state.passed[i]?'✓':(i+1)}</span><div><div class="ut">${u.short}</div><div class="ud">${u.dur}</div></div>${locked?'<span class="lk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></svg></span>':''}`;
    if(!locked) it.addEventListener('click',()=>{cur=i;finished=false;renderAll();window.scrollTo({top:0,behavior:'smooth'});});
    ulist.appendChild(it);
  });
  const passed=Object.keys(state.passed).filter(k=>state.passed[k]).length;
  document.getElementById('sideSub').textContent=`${passed} de ${UNITS.length} unidades`;
  document.getElementById('sbar').style.width=(passed/UNITS.length*100)+'%';
  document.getElementById('hbar').style.width=(passed/UNITS.length*100)+'%';
  document.getElementById('hpct').textContent=Math.round(passed/UNITS.length*100)+'%';
}

function renderMain(){
  if(finished){renderFinish();return;}
  const u=UNITS[cur], solved=!!state.passed[cur];
  const hs=u.hs.map(r=>`<a class="res" href="${r.u}" target="_blank" rel="noopener"><span class="e">${r.e}</span><span>${r.t}</span><span class="meta"><span class="kind">${r.k}</span> ↗</span></a>`).join('');
  const opts=u.opts.map((o,j)=>`<button class="opt" data-j="${j}" data-ok="${o.ok?1:0}"><span class="mk">${String.fromCharCode(65+j)}</span><span>${o.t}</span></button>`).join('');
  main.innerHTML=`
    <div class="crumb">Unidad ${cur+1} de ${UNITS.length}</div>
    <h1>${u.title}</h1>
    <div class="umeta"><span class="m"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 2"/></svg>${u.dur} de lectura</span><span class="m">📺 video próximamente</span></div>
    ${u.media}
    ${u.html}
    <div class="hsbox"><div class="ht"><span class="lg">H</span> Material de HubSpot para esta unidad</div>${hs}</div>
    <div class="quiz">
      <div class="ql">📝 Repaso rápido</div>
      <div class="q">${u.q}</div>
      <div class="opts">${opts}</div>
      <div class="fb"></div>
    </div>
    <div class="nav-foot">
      <button class="btn" id="prevBtn" ${cur===0?'disabled':''}><svg viewBox="0 0 24 24" fill="currentColor"><path d="M15 18l-6-6 6-6"/></svg> Anterior</button>
      ${solved?'':'<span class="lockhint" id="lh"><svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></svg> Respondé el repaso para continuar</span>'}
      <button class="btn pri" id="nextBtn" ${solved?'':'disabled'}>${cur<UNITS.length-1?'Siguiente unidad':'Terminar la sesión'} <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 6l6 6-6 6"/></svg></button>
    </div>`;
  // quiz
  const fb=main.querySelector('.fb');
  main.querySelectorAll('.opt').forEach(opt=>{
    if(solved){opt.disabled=true;if(opt.dataset.ok==='1')opt.classList.add('correct');}
    opt.addEventListener('click',()=>{
      if(state.passed[cur])return;
      const ok=opt.dataset.ok==='1', o=u.opts[+opt.dataset.j];
      main.querySelectorAll('.opt').forEach(x=>x.classList.remove('wrong'));
      if(ok){
        opt.classList.add('correct');main.querySelectorAll('.opt').forEach(x=>x.disabled=true);
        fb.className='fb ok show';fb.innerHTML='<b>✔ Correcto.</b> '+o.fb;
        state.passed[cur]=true;if(state.unlocked===cur)state.unlocked=cur+1;save();
        const nb=document.getElementById('nextBtn');nb.disabled=false;const lh=document.getElementById('lh');if(lh)lh.remove();
        renderSide();
      }else{
        opt.classList.add('wrong');fb.className='fb no show';fb.innerHTML='<b>✘ Todavía no.</b> '+o.fb+' Probá de nuevo.';
      }
    });
  });
  const pb=document.getElementById('prevBtn');if(pb)pb.addEventListener('click',()=>{if(cur>0){cur--;renderAll();window.scrollTo({top:0,behavior:'smooth'});}});
  const nb=document.getElementById('nextBtn');nb.addEventListener('click',()=>{
    if(!state.passed[cur])return;
    if(cur<UNITS.length-1){cur++;renderAll();window.scrollTo({top:0,behavior:'smooth'});}
    else{finished=true;markDone();renderAll();window.scrollTo({top:0,behavior:'smooth'});}
  });
}

function renderFinish(){
  main.innerHTML=`<div class="done-card">
    <div class="tro">🎉</div>
    <h1>¡Terminaste la Sesión 1!</h1>
    <p>Ya sabés qué es un CRM, de dónde viene, cómo guarda la información y cómo dar tus primeros pasos. Eso es la base de todo lo que sigue.</p>
    <p style="font-weight:700;color:var(--ink)">Quedate con esto: un CRM es la memoria del equipo sobre cada cliente, ordenada y compartida.</p>
    <div class="actions">
      <a class="btn pri" href="${NEXT}"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 6l6 6-6 6"/></svg> Ir a la Sesión 2</a>
      <a class="btn" href="${EXAM}">Rendir el examen de Fundamentos</a>
      <a class="btn" href="./">Volver a la academia</a>
    </div>
  </div>`;
}

function renderAll(){renderSide();renderMain();}
renderAll();
</script>
</body>
</html>
