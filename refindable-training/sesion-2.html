<style>
  :root{
    --paper:#f3f1ea;--paper2:#fbfaf6;--card:#fff;

  .ic{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

  header{position:sticky;top:0;z-index:100;background:rgba(243,241,234,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}

  .htitle{font-family:'Fraunces',serif;font-weight:500;font-size:16px;padding-left:14px;border-left:1px solid var(--line);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hprog{margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0}
  .hprog .pb{width:120px;height:6px;background:var(--line);border-radius:4px;overflow:hidden}
  .hprog .pb i{display:block;height:100%;width:0;background:var(--acc);border-radius:4px;transition:width .5s var(--ease)}

  .layout{max-width:1240px;margin:0 auto;padding:26px 24px 70px;display:grid;grid-template-columns:290px 1fr;gap:30px;align-items:start}

  .side{position:sticky;top:80px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
  .side .sh{padding:18px 20px;border-bottom:1px solid var(--line)}
  .side .sh .t{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .side .sh .s{font-size:13px;color:var(--ink);margin-top:6px}
  .side .sh .pb{height:5px;background:var(--line);border-radius:4px;margin-top:10px;overflow:hidden}
  .side .sh .pb i{display:block;height:100%;width:0;background:var(--acc);border-radius:4px;transition:width .5s var(--ease)}
  .ulist{padding:8px}
  .uitem{display:flex;align-items:center;gap:12px;padding:12px;border-radius:10px;cursor:pointer;transition:background .15s;border:1px solid transparent}
  .uitem:hover{background:var(--paper2)}.uitem.cur{background:var(--acc-soft);border-color:#cdd3fb}
  .uitem.lock{opacity:.5;cursor:not-allowed}
  .uitem .ix{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--line2);display:grid;place-items:center;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;color:var(--faint);flex-shrink:0}
  .uitem.cur .ix{border-color:var(--acc);color:var(--acc)}
  .uitem.done .ix{background:var(--acc);border-color:var(--acc);color:#fff}
  .uitem .ut{font-size:14px;font-weight:600;line-height:1.3}.uitem .ud{font-family:'Space Grotesk',sans-serif;font-size:11px;color:var(--faint);margin-top:1px}
  .uitem .lk{margin-left:auto;color:var(--faint)}.uitem .lk svg{width:15px;height:15px}

  .main{min-width:0}
  .crumb{font-family:'Space Grotesk',sans-serif;font-size:12.5px;font-weight:600;color:var(--acc);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
  .main h1{font-family:'Fraunces',serif;font-weight:400;font-size:clamp(28px,3.6vw,40px);letter-spacing:-.02em;line-height:1.1;margin-bottom:8px}
  .umeta{font-family:'Space Grotesk',sans-serif;font-size:13px;color:var(--faint);margin-bottom:24px;display:flex;gap:16px;flex-wrap:wrap}
  .umeta .m{display:flex;align-items:center;gap:6px}.umeta .ic{width:14px;height:14px;stroke:var(--faint)}

  .media{border-radius:var(--r);overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow);margin-bottom:26px;aspect-ratio:16/8;background:#e9e7df}
  .media img{width:100%;height:100%;object-fit:cover}

  .prose p{font-size:16.5px;margin-bottom:15px}
  .prose h3{font-family:'Fraunces',serif;font-weight:500;font-size:21px;margin:26px 0 10px;letter-spacing:-.01em}
  .prose ul{list-style:none;margin:4px 0 16px}
  .prose ul li{position:relative;padding:6px 0 6px 24px;font-size:16px}
  .prose ul li::before{content:'';position:absolute;left:2px;top:15px;width:6px;height:6px;border-radius:50%;background:var(--acc)}
  .prose b,.prose strong{font-weight:700}
  .note{background:var(--paper2);border:1px solid var(--line);border-left:3px solid var(--acc);border-radius:0 12px 12px 0;padding:14px 18px;margin:18px 0;font-size:15.5px}
  .compare{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px 0}
  .compare .col{border-radius:12px;padding:16px 18px;border:1px solid var(--line)}
  .compare .col.bad{background:var(--bad-s);border-color:#f0cfcb}.compare .col.good{background:var(--ok-s);border-color:#c6e6d2}
  .compare h5{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:7px}
  .compare .bad h5{color:var(--bad)}.compare .good h5{color:var(--ok)}
  .compare p{font-size:14.5px;margin:0}

  .tl{margin:6px 0 4px}
  .tl .ev{position:relative;padding:0 0 18px 26px;border-left:2px solid var(--line2);margin-left:6px}
  .tl .ev:last-child{border-left-color:transparent;padding-bottom:0}
  .tl .ev::before{content:'';position:absolute;left:-8px;top:2px;width:13px;height:13px;border-radius:50%;background:var(--acc);box-shadow:0 0 0 3px var(--acc-soft)}
  .tl .ev .yr{font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--acc);font-size:14.5px}
  .tl .ev .ti{font-weight:700;font-size:15.5px;margin:1px 0 2px}
  .tl .ev p{margin:0;font-size:14.5px;color:var(--muted);line-height:1.5}

  .hs{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;margin:26px 0}
  .hs .ht{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;color:var(--ink);margin-bottom:12px;display:flex;align-items:center;gap:10px}
  .hs .ht .tag{font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--acc);background:var(--acc-soft);padding:3px 9px;border-radius:100px}
  .hs a.r{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;color:var(--ink);font-weight:600;font-size:14px;transition:border-color .2s,transform .12s}
  .hs a.r:last-child{margin-bottom:0}.hs a.r:hover{border-color:var(--acc);transform:translateX(3px)}
  .hs a.r .src{margin-left:auto;font-family:'Space Grotesk',sans-serif;font-size:11.5px;color:var(--faint);display:flex;align-items:center;gap:8px}

  .quiz{margin-top:28px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:24px}
  .quiz .ql{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:12px}
  .quiz .q{font-size:18px;font-weight:600;line-height:1.4;margin-bottom:16px}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;gap:12px;align-items:flex-start;text-align:left;background:var(--paper2);border:1.5px solid var(--line2);border-radius:12px;padding:14px 16px;font-family:inherit;font-size:15.5px;color:var(--ink);cursor:pointer;transition:border-color .15s,background .15s;line-height:1.4}
  .opt:hover:not(:disabled){border-color:var(--acc);background:var(--acc-soft)}
  .opt .mk{width:25px;height:25px;border-radius:7px;background:#fff;border:1px solid var(--line2);display:grid;place-items:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:12.5px;color:var(--muted);flex-shrink:0}
  .opt.correct{border-color:var(--ok);background:var(--ok-s)}.opt.correct .mk{background:var(--ok);border-color:var(--ok);color:#fff}
  .opt.wrong{border-color:var(--bad);background:var(--bad-s)}.opt.wrong .mk{background:var(--bad);border-color:var(--bad);color:#fff}
  .opt:disabled{cursor:default}
  .fb{margin-top:12px;border-radius:11px;padding:13px 15px;font-size:14.5px;line-height:1.55;display:none}
  .fb.show{display:block}.fb.ok{background:var(--ok-s);color:#155f3b}.fb.no{background:var(--bad-s);color:#9a2a23}.fb b{font-weight:700}

  .nav-foot{display:flex;justify-content:space-between;align-items:center;margin-top:26px;gap:12px}
  .btn{display:inline-flex;align-items:center;gap:9px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px;padding:13px 22px;border-radius:11px;cursor:pointer;border:1px solid var(--line2);background:var(--card);color:var(--ink)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn.pri{background:var(--acc);color:#fff;border-color:var(--acc)}.btn.pri:not(:disabled):hover{background:var(--acc-d)}
  .btn svg{width:16px;height:16px;fill:currentColor}
  .lockhint{font-family:'Space Grotesk',sans-serif;font-size:13px;color:var(--faint);font-weight:600;display:flex;align-items:center;gap:8px}
  .lockhint svg{width:15px;height:15px;stroke:var(--faint);fill:none;stroke-width:2}

  .done-card{text-align:center;background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:44px 30px}
  .done-card .k{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--acc);margin-bottom:12px}
  .done-card h1{font-family:'Fraunces',serif;font-weight:400;font-size:34px;margin-bottom:10px}
  .done-card p{color:var(--muted);max-width:52ch;margin:0 auto 8px;font-size:16px}
  .done-card .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:22px}

  @media(max-width:900px){
    .layout{grid-template-columns:1fr;gap:18px}.side{position:static;order:-1}
    .ulist{display:flex;overflow-x:auto;padding:10px;gap:8px}
    .uitem{flex-direction:column;min-width:118px;text-align:center;align-items:center}
    .uitem .lk,.uitem .ud{display:none}.uitem .ut{font-size:12.5px}
    .compare{grid-template-columns:1fr}.htitle{display:none}
  }
  @media (prefers-reduced-motion:reduce){*{transition-duration:.01ms!important}}
</style>

<div class="layout">

    <div class="ulist" id="ulist"></div>
  </aside>

</div>

<script>
const SESSION='s2', NEXT='sesion-3.html', EXAM='examen-fundamentos.html';
const ph=id=>`https://images.unsplash.com/photo-${id}?auto=format&fit=crop&w=1100&q=72`;
const ext=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M9 7h8v8"/></svg>`;

const UNITS=[
  {
    short:'Los tres objetos',dur:'7 min',title:'Los tres objetos base',
    media:ph('1556761175-5973dc0f32e7'),alt:'Un equipo de ventas reunido alrededor de una mesa de trabajo.',
    html:`<div class="prose">
      <p>En la sesión anterior vimos que un CRM guarda todo sobre cada cliente. Ahora vamos a ver con qué piezas lo guarda. Son tres, y las vas a usar todos los días.</p>
      <ul>
        <li><b>Contacto:</b> una persona. Ana Gómez, con su mail, su teléfono y su puesto. Si es alguien con quien hablás, es un contacto.</li>
        <li><b>Empresa:</b> el lugar donde trabaja esa persona. La organización, con su sitio web, su rubro y su tamaño. Una misma empresa puede tener varios contactos.</li>
        <li><b>Negocio:</b> una posible venta. Una oportunidad concreta de plata, con un monto y una etapa. Por ejemplo: "Plan anual para Ana, etapa propuesta enviada".</li>
      </ul>
      <p>La forma más fácil de no confundirlos es esta pregunta: ¿estoy hablando de <b>una persona</b>, de <b>dónde trabaja</b>, o de <b>una venta que puede pasar</b>? Esas tres respuestas son contacto, empresa y negocio.</p>
      <h3>¿Para qué sirve separarlos?</h3>
      <p>Porque cada uno responde una pregunta distinta. El contacto te dice a quién llamar. La empresa te dice con qué cuenta estás tratando. El negocio te dice cuánta plata hay en juego y en qué etapa va. Si mezclás todo en un solo lado, después no podés contestar ninguna de las tres.</p>
      <div class="note"><b>Para acordarte:</b> persona, lugar de trabajo, venta posible. Contacto, empresa, negocio. Todo lo demás en el CRM se cuelga de estos tres.</div>
    </div>`,
    hs:[{t:'Cómo se usan los objetos en el CRM',u:'https://knowledge.hubspot.com/records/understand-objects',k:'HubSpot KB'},{t:'Cómo organizar tu base de datos',u:'https://knowledge.hubspot.com/get-started/manage-your-crm-database',k:'HubSpot KB'}],
    q:'Querés registrar una oportunidad de venta de $5.000 que estás trabajando con un cliente. ¿Qué objeto corresponde?',
    opts:[
      {t:'Un contacto, porque hay una persona involucrada.',ok:false,fb:'La persona es un contacto, sí, pero la venta en sí (el monto y la etapa) va en un negocio.'},
      {t:'Un negocio, porque es una venta posible con un monto y una etapa.',ok:true,fb:'Eso. El negocio es la oportunidad de venta. Después lo asociás al contacto y a su empresa.'},
      {t:'Una empresa, porque ahí va toda la plata.',ok:false,fb:'La empresa describe a la organización, no a una venta puntual. La venta va en un negocio.'},
      {t:'Una nota, así no ensucio el CRM.',ok:false,fb:'Una nota no se puede filtrar ni reportar. Una venta posible siempre va como negocio.'},
    ]
  },
  {
    short:'Asociaciones',dur:'6 min',title:'Asociaciones: conectar todo',
    media:ph('1460925895917-afdab827c52f'),alt:'Notas adhesivas y líneas conectando ideas en una pared de planificación.',
    html:`<div class="prose">
      <p>Tener los tres objetos por separado no alcanza. La magia aparece cuando los <b>conectás</b>. A esa conexión el CRM la llama <b>asociación</b>.</p>
      <p>Imaginate: Ana (contacto) trabaja en Acme (empresa), y con ella estás trabajando una venta del plan anual (negocio). Si asociás los tres, desde cualquiera de ellos ves toda la cuenta. Abrís a Ana y ya ves dónde trabaja y qué venta hay abierta. Abrís el negocio y ya sabés quién es la persona y de qué empresa.</p>
      <h3>Las asociaciones van en los dos sentidos</h3>
      <p>Si conectás a Ana con Acme, desde Acme también vas a ver a Ana. No tenés que cargar la conexión dos veces. La armás una vez y queda visible desde ambos lados.</p>
      <div class="compare"><div class="col bad"><h5>Sin asociar</h5><p>El contacto, la empresa y el negocio existen sueltos. No sabés quién pertenece a qué ni qué ventas tiene una cuenta.</p></div><div class="col good"><h5>Asociado</h5><p>Desde cualquier registro ves la cuenta completa: las personas, la empresa y las ventas abiertas.</p></div></div>
      <div class="note"><b>Caso típico:</b> una empresa con varios contactos. Asociás a todos a la misma empresa y, cuando alguien atiende esa cuenta, ve a todo el equipo del cliente de una sola mirada.</div>
    </div>`,
    hs:[{t:'Cómo asociar registros entre sí',u:'https://knowledge.hubspot.com/records/associate-records',k:'HubSpot KB'},{t:'Crear y asociar empresas con contactos automáticamente',u:'https://knowledge.hubspot.com/object-settings/automatically-create-and-associate-companies-with-contacts',k:'HubSpot KB'}],
    q:'Asociaste el contacto de Ana con la empresa Acme. ¿Qué pasa del lado de Acme?',
    opts:[
      {t:'Nada; hay que volver a cargar la asociación desde Acme.',ok:false,fb:'No hace falta. Las asociaciones son de dos vías: con cargarla una vez queda visible desde ambos lados.'},
      {t:'Desde Acme también vas a ver a Ana, porque la asociación va en los dos sentidos.',ok:true,fb:'Exacto. Una sola asociación se ve desde el contacto y desde la empresa.'},
      {t:'Se borra el contacto de Ana y queda solo la empresa.',ok:false,fb:'No se borra nada. Asociar es conectar, no reemplazar.'},
      {t:'Se crea un negocio nuevo automáticamente.',ok:false,fb:'Asociar un contacto a una empresa no crea ventas. El negocio se carga aparte cuando hay una oportunidad.'},
    ]
  },
  {
    short:'La ficha',dur:'6 min',title:'La ficha del registro',
    media:ph('1552664730-d307ca884978'),alt:'Persona revisando información de un cliente en la pantalla de su notebook.',
    html:`<div class="prose">
      <p>Cuando hacés clic en un contacto, una empresa o un negocio, se abre su <b>ficha</b>. Es la pantalla donde vive toda la información de ese registro. Parece cargada, pero siempre está organizada igual, en tres zonas.</p>
      <ul>
        <li><b>Columna izquierda:</b> los datos del registro (las propiedades) y las acciones rápidas, como dejar una nota o registrar una llamada.</li>
        <li><b>Centro:</b> la línea de tiempo. Todo lo que pasó con ese registro, lo más nuevo arriba. Acá leés la historia.</li>
        <li><b>Columna derecha:</b> las asociaciones. Las personas, empresas y negocios conectados a este registro.</li>
      </ul>
      <h3>Cómo leerla en treinta segundos</h3>
      <p>No leas todo. Mirá tres cosas y ya sabés en qué anda la cuenta: quién es (izquierda), qué pasó última (centro) y con qué está conectado (derecha). Con eso entrás a una reunión sin pedirle a nadie que te ponga al día.</p>
      <div class="note"><b>Dato:</b> cada casillero de datos de la ficha es una propiedad. El mail, la ciudad, el origen, la etapa del negocio. Por eso conviene completarlas bien: lo que cargás hoy es lo que vas a poder leer y filtrar mañana.</div>
    </div>`,
    hs:[{t:'Entender y usar la página del registro',u:'https://knowledge.hubspot.com/records/work-with-records',k:'HubSpot KB'},{t:'El diseño por defecto de la ficha',u:'https://knowledge.hubspot.com/records/understand-the-default-record-layout',k:'HubSpot KB'}],
    q:'Entrás a la ficha de un contacto y querés saber qué fue lo último que pasó con esa cuenta. ¿Dónde mirás?',
    opts:[
      {t:'En la columna izquierda, donde están los datos del contacto.',ok:false,fb:'Ahí ves quién es (sus propiedades), pero no la cronología de lo que pasó.'},
      {t:'En la línea de tiempo del centro, que muestra la actividad con lo más nuevo arriba.',ok:true,fb:'Correcto. El centro es la historia del registro, ordenada de lo más reciente a lo más viejo.'},
      {t:'En la columna derecha, donde están las asociaciones.',ok:false,fb:'La derecha te muestra con qué está conectado, no qué pasó última.'},
      {t:'No se puede ver; hay que preguntarle al vendedor anterior.',ok:false,fb:'Justamente para eso está la línea de tiempo: para no depender de la memoria de nadie.'},
    ]
  },
  {
    short:'Cargar contactos',dur:'7 min',title:'Cómo entran los contactos',
    media:ph('1551434678-e076c223a692'),alt:'Persona escribiendo en su computadora para cargar datos de un cliente.',
    html:`<div class="prose">
      <p>Hay dos formas de meter contactos al CRM, y las dos sirven. La cuestión es cuándo usar cada una.</p>
      <ul>
        <li><b>A mano, de a uno:</b> cuando llega un interesado nuevo, lo cargás vos en el momento. Ideal para el día a día.</li>
        <li><b>Por importación:</b> cuando tenés una lista grande (una planilla con cientos de contactos), la subís toda junta de una vez. Ideal para arrancar o para cargar una tanda.</li>
      </ul>
      <h3>El paso que no te podés saltear</h3>
      <p>Antes de crear un contacto, <b>buscalo primero</b> por mail o por nombre. Puede que ya exista. Si está, lo actualizás; no creás uno nuevo. Así evitás los <b>duplicados</b>, que son el problema número uno de cualquier base de datos: rompen los reportes y hacen que dos personas trabajen al mismo cliente sin saberlo.</p>
      <p>El CRM te ayuda: usa el <b>mail</b> como huella para no duplicar contactos, y el <b>dominio</b> para no duplicar empresas. Pero esa ayuda solo funciona si cargás el mail bien.</p>
      <div class="compare"><div class="col bad"><h5>Crear sin buscar</h5><p>Aparecen dos fichas del mismo cliente. Cada uno ve la mitad de la historia.</p></div><div class="col good"><h5>Buscar y después crear</h5><p>Una sola ficha por cliente, con todo junto. El equipo trabaja sobre la misma información.</p></div></div>
      <div class="note"><b>Regla de oro:</b> buscar antes de crear. Vale el minuto extra: un duplicado tarde cuesta mucho más que una búsqueda ahora.</div>
    </div>`,
    hs:[{t:'Cómo crear contactos',u:'https://knowledge.hubspot.com/records/create-contacts',k:'HubSpot KB'},{t:'Cómo se deduplican los registros',u:'https://knowledge.hubspot.com/records/deduplication-of-records',k:'HubSpot KB'}],
    q:'Te llega un interesado nuevo para cargar. ¿Cuál es el primer paso para no ensuciar el CRM?',
    opts:[
      {t:'Crearlo directo; si después hay un duplicado, alguien lo arregla.',ok:false,fb:'Así nacen las bases sucias. Los duplicados rompen reportes y hacen que dos personas atiendan al mismo cliente.'},
      {t:'Buscarlo primero por mail o nombre; si ya existe, actualizar ese registro.',ok:true,fb:'Correcto. Buscar antes de crear es el hábito que mantiene el CRM limpio.'},
      {t:'Importar siempre una planilla, aunque sea un solo contacto.',ok:false,fb:'La importación es para tandas grandes. Para uno solo, lo cargás a mano, pero buscándolo primero.'},
      {t:'Anotarlo en un papel para cargarlo otro día.',ok:false,fb:'Si no entra al CRM, no se puede seguir ni reportar. Cargalo ahora, después de buscarlo.'},
    ]
  },
  {
    short:'Registrar actividad',dur:'6 min',title:'Registrar la actividad',
    media:ph('1517245386807-bb43f82c33c4'),alt:'Persona hablando por teléfono mientras toma notas en su escritorio.',
    html:`<div class="prose">
      <p>Cargar el contacto es solo el principio. Lo que hace valioso a un CRM es lo que registrás <b>después</b>: cada vez que pasa algo con un cliente, lo dejás anotado en su ficha.</p>
      <ul>
        <li><b>Notas:</b> para anotar cualquier cosa. "Lo llamé, está esperando aprobación del gerente".</li>
        <li><b>Llamadas:</b> registrás que hablaste, con el resultado y un resumen.</li>
        <li><b>Reuniones:</b> dejás constancia de la reunión y qué se habló.</li>
      </ul>
      <p>Todo eso se apila en la <b>línea de tiempo</b> del registro y arma su historial. Y como las actividades se asocian al contacto, a su empresa y al negocio, aparecen en todas las fichas conectadas. Registrás una vez y se ve donde tiene que verse.</p>
      <h3>¿Por qué importa tanto el historial?</h3>
      <p>Porque la gente se va de vacaciones, cambia de equipo o de trabajo. Si todo está en la cabeza de una persona, cuando esa persona no está, la cuenta queda a ciegas. Si está en la ficha, cualquiera retoma sin hacer perder tiempo al cliente repitiéndole lo que ya dijo.</p>
      <div class="note"><b>La regla:</b> si pasó algo con el cliente y no quedó registrado, para el equipo es como si no hubiera pasado. Anotá en el momento, aunque sea corto.</div>
    </div>`,
    hs:[{t:'Cómo registrar actividades en un registro',u:'https://knowledge.hubspot.com/records/manually-log-activities-on-records',k:'HubSpot KB'},{t:'Filtrar la actividad en la línea de tiempo',u:'https://knowledge.hubspot.com/records/filter-activities-on-a-record-timeline',k:'HubSpot KB'}],
    q:'Tuviste una llamada importante con un cliente. ¿Por qué conviene registrarla en su ficha en vez de solo acordártela?',
    opts:[
      {t:'Porque queda en el historial y cualquiera del equipo puede retomar la cuenta sin depender de tu memoria.',ok:true,fb:'Eso. El historial en la ficha es la memoria compartida: si no estás, otro retoma sin hacer repetir al cliente.'},
      {t:'Porque registrar llamadas hace que el cliente compre más rápido.',ok:false,fb:'Registrar no vende solo. Sirve para no perder información y poder retomar la cuenta.'},
      {t:'No conviene; mejor guardarlo en tu cabeza para no llenar la ficha.',ok:false,fb:'Si está solo en tu cabeza, se pierde cuando no estás. El historial existe justo para eso.'},
      {t:'Porque así se borran las actividades viejas automáticamente.',ok:false,fb:'No se borra nada. Al contrario: la idea es acumular el historial para tenerlo a mano.'},
    ]
  },
];

const LS='refindable_sesion_'+SESSION;
let state={unlocked:0,passed:{}};try{state=Object.assign(state,JSON.parse(localStorage.getItem(LS)||'{}'))}catch(e){}
const save=()=>{try{localStorage.setItem(LS,JSON.stringify(state))}catch(e){}};
function markDone(){try{const k='refindable_academy_progress_v1';const p=JSON.parse(localStorage.getItem(k)||'{}');p[SESSION]=true;localStorage.setItem(k,JSON.stringify(p));}catch(e){}}
let cur=Math.min(state.unlocked,UNITS.length-1), finished=UNITS.every((_,i)=>state.passed[i]);
const ulist=document.getElementById('ulist'),main=document.getElementById('main');
const check='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M20 6L9 17l-5-5"/></svg>';

function renderSide(){
  ulist.innerHTML='';
  UNITS.forEach((u,i)=>{
    const locked=i>state.unlocked;
    const it=document.createElement('div');
    it.className='uitem'+(i===cur&&!finished?' cur':'')+(state.passed[i]?' done':'')+(locked?' lock':'');
    it.innerHTML=`<span class="ix">${state.passed[i]?'✓':(i+1)}</span><div><div class="ut">${u.short}</div><div class="ud">${u.dur}</div></div>${locked?'<span class="lk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></svg></span>':''}`;
    if(!locked)it.addEventListener('click',()=>{cur=i;finished=false;renderAll();scrollTo({top:0,behavior:'smooth'});});
    ulist.appendChild(it);
  });
  const p=Object.keys(state.passed).filter(k=>state.passed[k]).length;
  document.getElementById('sideSub').textContent=`${p} de ${UNITS.length} unidades`;
  document.getElementById('sbar').style.width=(p/UNITS.length*100)+'%';
  document.getElementById('hbar').style.width=(p/UNITS.length*100)+'%';
  document.getElementById('hpct').textContent=Math.round(p/UNITS.length*100)+'%';
}
function renderMain(){
  if(finished){renderFinish();return;}
  const u=UNITS[cur],solved=!!state.passed[cur];
  const media=u.timeline?`<div class="hs" style="margin-top:0"><div class="ht"><span class="tag">Historia</span> Del Rolodex a la nube</div><div class="tl">${u.timeline}</div></div>`:`<div class="media"><img src="${u.media}" alt="${u.alt}" loading="lazy"></div>`;
  const hs=u.hs.map(r=>`<a class="r" href="${r.u}" target="_blank" rel="noopener"><span>${r.t}</span><span class="src">${r.k} ${ext}</span></a>`).join('');
  const opts=u.opts.map((o,j)=>`<button class="opt" data-j="${j}" data-ok="${o.ok?1:0}"><span class="mk">${String.fromCharCode(65+j)}</span><span>${o.t}</span></button>`).join('');
  main.innerHTML=`
    <div class="crumb">Unidad ${cur+1} de ${UNITS.length}</div>
    <h1>${u.title}</h1>
    <div class="umeta"><span class="m"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 2"/></svg>${u.dur} de lectura</span><span class="m">Video próximamente</span></div>
    ${media}
    ${u.html}
    <div class="hs"><div class="ht"><span class="tag">HubSpot</span> Material para esta unidad</div>${hs}</div>
    <div class="quiz"><div class="ql">Repaso rápido</div><div class="q">${u.q}</div><div class="opts">${opts}</div><div class="fb"></div></div>
    <div class="nav-foot">
      <button class="btn" id="prevBtn" ${cur===0?'disabled':''}><svg viewBox="0 0 24 24" fill="currentColor"><path d="M15 18l-6-6 6-6"/></svg> Anterior</button>
      ${solved?'':'<span class="lockhint" id="lh"><svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></svg> Respondé el repaso para continuar</span>'}
      <button class="btn pri" id="nextBtn" ${solved?'':'disabled'}>${cur<UNITS.length-1?'Siguiente':'Terminar'} <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 6l6 6-6 6"/></svg></button>
    </div>`;
  const fb=main.querySelector('.fb');
  main.querySelectorAll('.opt').forEach(opt=>{
    if(solved){opt.disabled=true;if(opt.dataset.ok==='1')opt.classList.add('correct');}
    opt.addEventListener('click',()=>{
      if(state.passed[cur])return;
      const ok=opt.dataset.ok==='1',o=u.opts[+opt.dataset.j];
      main.querySelectorAll('.opt').forEach(x=>x.classList.remove('wrong'));
      if(ok){opt.classList.add('correct');main.querySelectorAll('.opt').forEach(x=>x.disabled=true);
        fb.className='fb ok show';fb.innerHTML='<b>Correcto.</b> '+o.fb;
        state.passed[cur]=true;if(state.unlocked===cur)state.unlocked=cur+1;save();
        document.getElementById('nextBtn').disabled=false;const lh=document.getElementById('lh');if(lh)lh.remove();renderSide();
      }else{opt.classList.add('wrong');fb.className='fb no show';fb.innerHTML='<b>Todavía no.</b> '+o.fb+' Probá de nuevo.';}
    });
  });
  const pb=document.getElementById('prevBtn');if(pb)pb.addEventListener('click',()=>{if(cur>0){cur--;renderAll();scrollTo({top:0,behavior:'smooth'});}});
  document.getElementById('nextBtn').addEventListener('click',()=>{
    if(!state.passed[cur])return;
    if(cur<UNITS.length-1){cur++;renderAll();scrollTo({top:0,behavior:'smooth'});}
    else{finished=true;markDone();renderAll();scrollTo({top:0,behavior:'smooth'});}
  });
}
function renderFinish(){
  main.innerHTML=`<div class="done-card">
    <div class="k">Sesión completa</div>
    <h1 class="serif">¡Terminaste la Sesión 2!</h1>
    <p>Ya conocés los tres objetos base, sabés cómo se conectan, cómo leer una ficha, cómo cargar contactos sin duplicar y por qué registrar la actividad. Con esto ya te movés por la cuenta completa de un cliente.</p>
    <p style="font-weight:600;color:var(--ink)">Quedate con esto: contacto, empresa y negocio, bien asociados y con su historial al día, te muestran la cuenta entera de un vistazo.</p>
    <div class="actions">
      <a class="btn pri" href="${NEXT}">Ir a la Sesión 3 <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 6l6 6-6 6"/></svg></a>
      <a class="btn" href="${EXAM}">Rendir el examen de Fundamentos</a>
      <a class="btn" href="./">Volver a la academia</a>
    </div>
  </div>`;
}
function renderAll(){renderSide();renderMain();}
renderAll();
</script>
