  .hs a.r{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;color:var(--ink);font-weight:600;font-size:14px;transition:border-color .2s,transform .12s}
  .hs a.r:last-child{margin-bottom:0}.hs a.r:hover{border-color:var(--acc);transform:translateX(3px)}
  .hs a.r .src{margin-left:auto;font-family:'Space Grotesk',sans-serif;font-size:11.5px;color:var(--faint);display:flex;align-items:center;gap:8px}

  .quiz{margin-top:28px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:24px}
  .quiz .ql{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:12px}
  .quiz .q{font-size:18px;font-weight:600;line-height:1.4;margin-bottom:16px}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;gap:12px;align-items:flex-start;text-align:left;background:var(--paper2);border:1.5px solid var(--line2);border-radius:12px;padding:14px 16px;font-family:inherit;font-size:15.5px;color:var(--ink);cursor:pointer;transition:border-color .15s,background .15s;line-height:1.4}
  .opt:hover:not(:disabled){border-color:var(--acc);background:var(--acc-soft)}
  .opt .mk{width:25px;height:25px;border-radius:7px;background:#fff;border:1px solid var(--line2);display:grid;place-items:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:12.5px;color:var(--muted);flex-shrink:0}
  .opt.correct{border-color:var(--ok);background:var(--ok-s)}.opt.correct .mk{background:var(--ok);border-color:var(--ok);color:#fff}
  .opt.wrong{border-color:var(--bad);background:var(--bad-s)}.opt.wrong .mk{background:var(--bad);border-color:var(--bad);color:#fff}
  .opt:disabled{cursor:default}
  .fb{margin-top:12px;border-radius:11px;padding:13px 15px;font-size:14.5px;line-height:1.55;display:none}
  .fb.show{display:block}.fb.ok{background:var(--ok-s);color:#155f3b}.fb.no{background:var(--bad-s);color:#9a2a23}.fb b{font-weight:700}

  .nav-foot{display:flex;justify-content:space-between;align-items:center;margin-top:26px;gap:12px}
  .btn{display:inline-flex;align-items:center;gap:9px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px;padding:13px 22px;border-radius:11px;cursor:pointer;border:1px solid var(--line2);background:var(--card);color:var(--ink)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn.pri{background:var(--acc);color:#fff;border-color:var(--acc)}.btn.pri:not(:disabled):hover{background:var(--acc-d)}
  .btn svg{width:16px;height:16px;fill:currentColor}
  .lockhint{font-family:'Space Grotesk',sans-serif;font-size:13px;color:var(--faint);font-weight:600;display:flex;align-items:center;gap:8px}
  .lockhint svg{width:15px;height:15px;stroke:var(--faint);fill:none;stroke-width:2}

  .done-card{text-align:center;background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:44px 30px}
  .done-card .k{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--acc);margin-bottom:12px}
  .done-card h1{font-family:'Fraunces',serif;font-weight:400;font-size:34px;margin-bottom:10px}
  .done-card p{color:var(--muted);max-width:52ch;margin:0 auto 8px;font-size:16px}
  .done-card .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:22px}

  @media(max-width:900px){
    .layout{grid-template-columns:1fr;gap:18px}.side{position:static;order:-1}

    .uitem{flex-direction:column;min-width:118px;text-align:center;align-items:center}
    .uitem .lk,.uitem .ud{display:none}.uitem .ut{font-size:12.5px}

  @media (prefers-reduced-motion:reduce){*{transition-duration:.01ms!important}}

<script>
const SESSION='s4', NEXT='sesion-5.html', EXAM='examen-intermedio.html';
const ph=id=>`https://images.unsplash.com/photo-${id}?auto=format&fit=crop&w=1100&q=72`;
const ext=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M9 7h8v8"/></svg>`;

const UNITS=[
  {
    short:'¿Qué es un pipeline?',dur:'6 min',title:'Pipeline y negocio: lo primero',
    media:ph('1460925895917-afdab827c52f'),alt:'Una persona ordenando información en una pantalla de trabajo.',
    html:`<div class="prose">
      <p>Arranquemos por lo básico. Un <b>pipeline</b> (en castellano, embudo o cañería de ventas) es el camino que recorre una venta desde que aparece un interesado hasta que se cierra. Es la foto de "qué tengo entre manos" en este momento.</p>
      <p>Y cada una de esas posibles ventas se llama <b>negocio</b> u <b>oportunidad</b>. Un negocio no es un cliente ni un contacto: es <b>una posible venta concreta</b>. Por ejemplo, "Departamento en Palermo para la familia Pérez". Esa es una oportunidad que puede terminar en venta… o no.</p>
      <ul>
        <li>El <b>contacto</b> es la persona (Juan Pérez).</li>
        <li>La <b>empresa</b> es dónde trabaja o a qué pertenece.</li>
        <li>El <b>negocio</b> es la plata que está en juego en esa operación puntual.</li>
      </ul>
      <p>Una misma persona puede tener varios negocios con el tiempo: te alquila ahora y te compra el año que viene. Son dos oportunidades distintas, cada una con su propio recorrido.</p>
      <div class="note"><b>Para que quede claro:</b> el pipeline es el tablero; los negocios son las fichas que se mueven por ese tablero. Sin negocios cargados, el pipeline está vacío y no podés medir nada.</div>
    </div>`,
    hs:[{t:'Configurar y administrar los pipelines de objetos',u:'https://knowledge.hubspot.com/object-settings/set-up-and-customize-pipelines',k:'HubSpot KB'},{t:'Propiedades de negocio por defecto en HubSpot',u:'https://knowledge.hubspot.com/properties/hubspots-default-deal-properties',k:'HubSpot KB'}],
    q:'¿Qué es, exactamente, un "negocio" (u oportunidad) dentro del pipeline?',
    opts:[
      {t:'Es lo mismo que un contacto: la persona con la que hablás.',ok:false,fb:'No. El contacto es la persona; el negocio es la posible venta concreta que estás tratando de cerrar con esa persona.'},
      {t:'Una posible venta concreta, con su monto, que avanza por el pipeline.',ok:true,fb:'Tal cual. Un negocio es una oportunidad puntual de venta, con su plata en juego, que recorre las etapas.'},
      {t:'Un reporte que arma el sistema a fin de mes.',ok:false,fb:'No. El reporte sale después, a partir de los negocios. El negocio es la oportunidad en sí.'},
      {t:'La empresa donde trabaja el cliente.',ok:false,fb:'Esa es la empresa. El negocio es la operación puntual que puede cerrarse, no el lugar donde trabaja la persona.'},
    ]
  },
  {
    short:'Las etapas',dur:'6 min',title:'Las etapas, del primer contacto al cierre',
    media:ph('1552664730-d307ca884978'),alt:'Equipo revisando los pasos de un proceso en una reunión.',
    html:`<div class="prose">
      <p>El pipeline está dividido en <b>etapas</b>: pasos en orden que muestran qué tan cerca está la venta del cierre. No son adornos; cada etapa significa que pasó algo concreto.</p>
      <p>Un recorrido típico, ordenado de principio a fin, se parece a esto:</p>
      <ul>
        <li><b>Primer contacto:</b> apareció el interesado, todavía no sabés casi nada.</li>
        <li><b>Calificado:</b> confirmaste que tiene interés real y que le da el presupuesto.</li>
        <li><b>Presentación / propuesta:</b> le mostraste la opción o le mandaste una cotización.</li>
        <li><b>Negociación:</b> están afinando precio, condiciones, detalles.</li>
        <li><b>Cierre ganado</b> o <b>cierre perdido:</b> se firmó… o se cayó.</li>
      </ul>
      <p>La regla de oro: las etapas van <b>en orden</b> y una etapa más avanzada quiere decir que estás más cerca del sí. Por eso importa mover el negocio recién cuando el paso de verdad ocurrió, no porque tengas ganas de verlo avanzar.</p>
      <div class="note"><b>Ojo con esto:</b> "Cierre perdido" también es una etapa válida y necesaria. Marcar lo que se cae es tan importante como marcar lo que se gana; si no, el pipeline se llena de negocios fantasma.</div>
    </div>`,
    hs:[{t:'Configurar y administrar los pipelines de objetos',u:'https://knowledge.hubspot.com/object-settings/set-up-and-customize-pipelines',k:'HubSpot KB'},{t:'Configurar reglas para los pipelines',u:'https://knowledge.hubspot.com/object-settings/set-up-pipeline-rules',k:'HubSpot KB'}],
    q:'¿Cuándo conviene mover un negocio a la etapa siguiente?',
    opts:[
      {t:'Cuando ya pasó de verdad el paso que esa etapa representa.',ok:true,fb:'Correcto. La etapa refleja la realidad: se avanza solo cuando el hecho concreto ocurrió.'},
      {t:'Apenas lo cargás, así arranca más adelante y parece que vas ganando.',ok:false,fb:'No. Inflar la etapa miente sobre el estado real y arruina cualquier estimación de ventas.'},
      {t:'Cuando el jefe pide ver más movimiento en el tablero.',ok:false,fb:'Mover por presión, sin que pasara el paso, ensucia el pipeline. La etapa debe reflejar lo que realmente sucedió.'},
      {t:'Una vez por semana, todos los negocios juntos, sin importar el estado.',ok:false,fb:'No se avanza en bloque por costumbre. Cada negocio se mueve según su propia situación real.'},
    ]
  },
  {
    short:'Probabilidad y monto',dur:'7 min',title:'Probabilidad y monto: estimar la venta',
    media:ph('1551434678-e076c223a692'),alt:'Persona analizando números y montos en su computadora.',
    html:`<div class="prose">
      <p>Acá está la parte que convierte al pipeline en una herramienta de plata, no solo en una lista. Cada negocio tiene dos datos clave: el <b>monto</b> (cuánta plata es) y la <b>probabilidad de cierre</b> (qué chance hay de que se concrete).</p>
      <p>Lo interesante es que <b>cada etapa tiene una probabilidad asociada</b>. Cuanto más avanzada la etapa, más alta la chance de cerrar:</p>
      <ul>
        <li>Primer contacto: chance baja (recién empieza).</li>
        <li>Calificado: la chance sube (ya sabés que hay interés real).</li>
        <li>Propuesta / negociación: chance alta (estás cerca).</li>
        <li>Cierre ganado: 100%. Cierre perdido: 0%.</li>
      </ul>
      <h3>El truco del monto ponderado</h3>
      <p>Si multiplicás el monto por la probabilidad, obtenés el <b>monto ponderado</b>: una estimación realista de cuánto vas a facturar. Un negocio de $1.000.000 con 40% de chance "vale", para la estimación, $400.000.</p>
      <div class="compare"><div class="col bad"><h5>Mirar solo el monto total</h5><p>"Tengo $10M en el pipeline." Suena lindo, pero mezcla negocios casi cerrados con otros que recién arrancan.</p></div><div class="col good"><h5>Mirar el monto ponderado</h5><p>"Espero cerrar unos $3,5M." Más bajo, pero realista: ya descontó las chances de cada etapa.</p></div></div>
      <div class="note">Por eso conviene tener la etapa siempre al día: si la etapa miente, la probabilidad miente, y la estimación de ventas se vuelve un número de fantasía.</div>
    </div>`,
    hs:[{t:'Configurar la herramienta de previsión (forecast)',u:'https://knowledge.hubspot.com/forecast/set-up-the-forecast-tool',k:'HubSpot KB'},{t:'Usar la herramienta de previsión',u:'https://knowledge.hubspot.com/forecast/use-the-forecast-tool',k:'HubSpot KB'}],
    q:'Un negocio es de $2.000.000 y está en una etapa con 50% de probabilidad. ¿Cuál es su monto ponderado para la estimación?',
    opts:[
      {t:'$2.000.000, porque ese es el monto que figura.',ok:false,fb:'Ese es el monto total, sin descontar el riesgo. El ponderado pesa la chance de que realmente cierre.'},
      {t:'$1.000.000, porque es el monto multiplicado por la probabilidad.',ok:true,fb:'Exacto. Monto por probabilidad: 2.000.000 x 0,50 = 1.000.000. Esa es la estimación realista.'},
      {t:'$0, porque todavía no se cerró.',ok:false,fb:'No. Que no esté cerrado no significa que valga cero; por eso usamos la probabilidad, no el todo o nada.'},
      {t:'$4.000.000, sumando el monto y la chance.',ok:false,fb:'No se suma: se multiplica el monto por la probabilidad. El resultado siempre es menor o igual al monto.'},
    ]
  },
  {
    short:'Mantenerlo al día',dur:'6 min',title:'Mover los negocios y mantener el orden',
    media:ph('1517245386807-bb43f82c33c4'),alt:'Personas organizando tareas y notas en una pared de trabajo.',
    html:`<div class="prose">
      <p>Un pipeline hermoso configurado sirve de poco si nadie lo actualiza. Acá entra la parte menos glamorosa y más importante: la <b>disciplina diaria</b>.</p>
      <p>En la práctica, mover un negocio es simple: en la vista de tablero arrastrás la ficha de una etapa a la siguiente cuando el paso ocurrió. El sistema recalcula solo los totales y la probabilidad. Pero lo simple hay que hacerlo <b>todos los días</b>.</p>
      <h3>La rutina que mantiene todo limpio</h3>
      <ul>
        <li><b>Después de cada interacción</b>, actualizá la etapa y dejá una nota de qué pasó.</li>
        <li><b>Marcá los perdidos</b> sin culpa: un negocio caído tiene que ir a "Cierre perdido", no quedar colgado.</li>
        <li><b>Poné próxima tarea o fecha</b> a cada negocio activo, así nada se queda sin seguimiento.</li>
        <li><b>Revisá los estancados:</b> si un negocio lleva semanas sin moverse, algo pasa.</li>
      </ul>
      <div class="compare"><div class="col bad"><h5>Pipeline abandonado</h5><p>Negocios viejos, etapas desactualizadas, nadie sabe qué está vivo. Los reportes no sirven.</p></div><div class="col good"><h5>Pipeline al día</h5><p>Cada ficha refleja la realidad de hoy. Mirás el tablero y sabés exactamente dónde estás parado.</p></div></div>
      <div class="note"><b>La regla del minuto:</b> actualizar el negocio justo después de la llamada toma un minuto. Hacerlo "después", de memoria, toma más y sale peor. Cargá en caliente.</div>
    </div>`,
    hs:[{t:'Administrar registros en la vista de tablero',u:'https://knowledge.hubspot.com/records/manage-records-in-board-view',k:'HubSpot KB'},{t:'Administrar negocios en el espacio de ventas',u:'https://knowledge.hubspot.com/prospecting/create-and-manage-deals-in-the-sales-workspace',k:'HubSpot KB'}],
    q:'Terminás una llamada en la que el cliente te confirmó que avanza. ¿Qué conviene hacer?',
    opts:[
      {t:'Anotarlo en un papel y cargarlo en el CRM la semana que viene.',ok:false,fb:'Cargar de memoria días después sale peor y se pierden detalles. La etapa queda desactualizada mientras tanto.'},
      {t:'Actualizar la etapa y dejar una nota ahí mismo, en caliente.',ok:true,fb:'Eso. Actualizar al toque mantiene el pipeline fiel a la realidad y no te olvidás de nada.'},
      {t:'No tocar nada hasta que el negocio esté cerrado del todo.',ok:false,fb:'No. Si solo actualizás al cerrar, durante todo el proceso el pipeline miente y no podés estimar.'},
      {t:'Esperar a la reunión de equipo para mover todos los negocios juntos.',ok:false,fb:'Mover en bloque y tarde acumula errores. Lo mejor es actualizar cada negocio cuando pasa el hecho.'},
    ]
  },
  {
    short:'Leer el embudo',dur:'7 min',title:'Leer el embudo y entender el forecast',
    media:ph('1556761175-5973dc0f32e7'),alt:'Equipo analizando resultados y métricas en conjunto.',
    html:`<div class="prose">
      <p>Cuando el pipeline está al día, se vuelve un mapa que te dice dónde mejorar. Leerlo es mirar el <b>embudo</b>: cuántos negocios entran en cada etapa y cuántos pasan a la siguiente.</p>
      <p>Se llama embudo porque arriba entran muchos y abajo cierran pocos. Eso es normal. Lo que importa es <b>dónde se angosta de golpe</b>: ahí está el cuello de botella, el lugar donde la gente se traba.</p>
      <ul>
        <li>Si de "Calificado" a "Propuesta" se cae el 80%, el problema está en cómo presentás.</li>
        <li>Si entran pocos en "Primer contacto", el problema es de generación de interesados, no de cierre.</li>
        <li>Si los negocios se quedan <b>mucho tiempo</b> en una etapa, algo los frena ahí.</li>
      </ul>
      <h3>Qué dice el forecast (la previsión)</h3>
      <p>El <b>forecast</b> es la estimación de cuánto vas a cerrar en un período, calculada a partir de los montos y las probabilidades de tu pipeline. No es una bola de cristal: es la suma realista de lo que ya tenés en marcha. Si el forecast queda corto contra el objetivo, lo sabés <b>hoy</b> y no a fin de mes, cuando ya no hay margen para reaccionar.</p>
      <div class="note"><b>La idea central:</b> el embudo te muestra dónde se traba la gente; el forecast te dice si vas a llegar. Las dos lecturas dependen de que el pipeline esté cargado con honestidad.</div>
    </div>`,
    hs:[{t:'Crear reportes de ventas en la suite de análisis',u:'https://knowledge.hubspot.com/reports/create-sales-reports-in-the-sales-analytics-suite',k:'HubSpot KB'},{t:'Medir resultados con reportes de embudo',u:'https://academy.hubspot.com/lessons/hubspot-funnel-reports',k:'HubSpot Academy'}],
    q:'En tu embudo, de "Calificado" a "Propuesta" se cae la gran mayoría de los negocios. ¿Qué te está diciendo?',
    opts:[
      {t:'Que tenés un cuello de botella en ese paso y conviene revisar cómo presentás o cotizás.',ok:true,fb:'Correcto. Una caída fuerte entre dos etapas marca dónde se traba el proceso, justo lo que el embudo sirve para detectar.'},
      {t:'Que el embudo está roto y hay que ignorarlo.',ok:false,fb:'No. El embudo está funcionando: te está señalando con precisión dónde se pierden las oportunidades.'},
      {t:'Que hay que borrar esos negocios para que el reporte se vea mejor.',ok:false,fb:'Jamás. Maquillar los datos esconde el problema real, que es justamente lo que necesitás resolver.'},
      {t:'Que el problema seguro es la falta de interesados nuevos.',ok:false,fb:'No: la caída está en un paso intermedio, no en la entrada. Pocos interesados sería un problema arriba del embudo, no acá.'},
    ]
  },
];

const LS='refindable_sesion_'+SESSION;
let state={unlocked:0,passed:{}};try{state=Object.assign(state,JSON.parse(localStorage.getItem(LS)||'{}'))}catch(e){}
const save=()=>{try{localStorage.setItem(LS,JSON.stringify(state))}catch(e){}};
function markDone(){try{const k='refindable_academy_progress_v1';const p=JSON.parse(localStorage.getItem(k)||'{}');p[SESSION]=true;localStorage.setItem(k,JSON.stringify(p));}catch(e){}}
let cur=Math.min(state.unlocked,UNITS.length-1), finished=UNITS.every((_,i)=>state.passed[i]);
const ulist=document.getElementById('ulist'),main=document.getElementById('main');
const check='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M20 6L9 17l-5-5"/></svg>';

function renderSide(){
  ulist.innerHTML='';
  UNITS.forEach((u,i)=>{
    const locked=i>state.unlocked;
    const it=document.createElement('div');
    it.className='uitem'+(i===cur&&!finished?' cur':'')+(state.passed[i]?' done':'')+(locked?' lock':'');
    it.innerHTML=`<span class="ix">${state.passed[i]?'✓':(i+1)}</span><div><div class="ut">${u.short}</div><div class="ud">${u.dur}</div></div>${locked?'<span class="lk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></svg></span>':''}`;
    if(!locked)it.addEventListener('click',()=>{cur=i;finished=false;renderAll();scrollTo({top:0,behavior:'smooth'});});
    ulist.appendChild(it);
  });
  const p=Object.keys(state.passed).filter(k=>state.passed[k]).length;
  document.getElementById('sideSub').textContent=`${p} de ${UNITS.length} unidades`;
  document.getElementById('sbar').style.width=(p/UNITS.length*100)+'%';
  document.getElementById('hbar').style.width=(p/UNITS.length*100)+'%';
  document.getElementById('hpct').textContent=Math.round(p/UNITS.length*100)+'%';
}
function renderMain(){
  if(finished){renderFinish();return;}
  const u=UNITS[cur],solved=!!state.passed[cur];
  const media=u.timeline?`<div class="hs" style="margin-top:0"><div class="ht"><span class="tag">Historia</span> Del Rolodex a la nube</div><div class="tl">${u.timeline}</div></div>`:`<div class="media"><img src="${u.media}" alt="${u.alt}" loading="lazy"></div>`;
  const hs=u.hs.map(r=>`<a class="r" href="${r.u}" target="_blank" rel="noopener"><span>${r.t}</span><span class="src">${r.k} ${ext}</span></a>`).join('');
  const opts=u.opts.map((o,j)=>`<button class="opt" data-j="${j}" data-ok="${o.ok?1:0}"><span class="mk">${String.fromCharCode(65+j)}</span><span>${o.t}</span></button>`).join('');
  main.innerHTML=`
    <div class="crumb">Unidad ${cur+1} de ${UNITS.length}</div>
    <h1>${u.title}</h1>
    <div class="umeta"><span class="m"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 2"/></svg>${u.dur} de lectura</span><span class="m">Video próximamente</span></div>
    ${media}
    ${u.html}
    <div class="hs"><div class="ht"><span class="tag">HubSpot</span> Material para esta unidad</div>${hs}</div>
    <div class="quiz"><div class="ql">Repaso rápido</div><div class="q">${u.q}</div><div class="opts">${opts}</div><div class="fb"></div></div>
    <div class="nav-foot">
      <button class="btn" id="prevBtn" ${cur===0?'disabled':''}><svg viewBox="0 0 24 24" fill="currentColor"><path d="M15 18l-6-6 6-6"/></svg> Anterior</button>
      ${solved?'':'<span class="lockhint" id="lh"><svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></svg> Respondé el repaso para continuar</span>'}
      <button class="btn pri" id="nextBtn" ${solved?'':'disabled'}>${cur<UNITS.length-1?'Siguiente':'Terminar'} <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 6l6 6-6 6"/></svg></button>
    </div>`;
  const fb=main.querySelector('.fb');
  main.querySelectorAll('.opt').forEach(opt=>{
    if(solved){opt.disabled=true;if(opt.dataset.ok==='1')opt.classList.add('correct');}
    opt.addEventListener('click',()=>{
      if(state.passed[cur])return;
      const ok=opt.dataset.ok==='1',o=u.opts[+opt.dataset.j];
      main.querySelectorAll('.opt').forEach(x=>x.classList.remove('wrong'));
      if(ok){opt.classList.add('correct');main.querySelectorAll('.opt').forEach(x=>x.disabled=true);
        fb.className='fb ok show';fb.innerHTML='<b>Correcto.</b> '+o.fb;
        state.passed[cur]=true;if(state.unlocked===cur)state.unlocked=cur+1;save();
        document.getElementById('nextBtn').disabled=false;const lh=document.getElementById('lh');if(lh)lh.remove();renderSide();
      }else{opt.classList.add('wrong');fb.className='fb no show';fb.innerHTML='<b>Todavía no.</b> '+o.fb+' Probá de nuevo.';}
    });
  });
  const pb=document.getElementById('prevBtn');if(pb)pb.addEventListener('click',()=>{if(cur>0){cur--;renderAll();scrollTo({top:0,behavior:'smooth'});}});
  document.getElementById('nextBtn').addEventListener('click',()=>{
    if(!state.passed[cur])return;
    if(cur<UNITS.length-1){cur++;renderAll();scrollTo({top:0,behavior:'smooth'});}
    else{finished=true;markDone();renderAll();scrollTo({top:0,behavior:'smooth'});}
  });
}
function renderFinish(){
  main.innerHTML=`<div class="done-card">
    <div class="k">Sesión completa</div>
    <h1 class="serif">¡Terminaste la Sesión 4!</h1>
    <p>Ya sabés qué es un pipeline y un negocio, cómo se ordenan las etapas, cómo el monto y la probabilidad estiman tus ventas, la disciplina de mantenerlo al día y cómo leer el embudo y el forecast.</p>
    <p style="font-weight:600;color:var(--ink)">Quedate con esto: el pipeline solo dice la verdad si lo cargás con honestidad y lo mantenés al día.</p>
    <div class="actions">
      <a class="btn pri" href="${NEXT}">Ir a la Sesión 5 <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 6l6 6-6 6"/></svg></a>
      <a class="btn" href="${EXAM}">Rendir el examen Intermedio</a>
      <a class="btn" href="./">Volver a la academia</a>
    </div>
  </div>`;
}
function renderAll(){renderSide();renderMain();}
renderAll();
</script>
</body>
</html>
