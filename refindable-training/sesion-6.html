<meta name="description" content="Qué conviene automatizar y qué no, cómo funcionan los disparadores y las acciones, esperas y bifurcaciones, y cómo poner metas para que la automatización no moleste de más. Clase con material de HubSpot y un repaso por unidad.">

<style>
  :root{
    --paper:#f3f1ea;--paper2:#fbfaf6;--card:#fff;
    --ink:#181712;--ink2:#3a382f;--muted:#6f6c60;--faint:#9d9a8c;--line:#e3e0d6;--line2:#d6d2c5;
    --acc:#2138e0;--acc-d:#1a2cb4;--acc-soft:#e7e9fd;
    --ok:#1f7a4d;--ok-s:#e4f3ea;--bad:#c23b32;--bad-s:#fae9e7;
    --r:14px;--ease:cubic-bezier(.4,0,.2,1);--shadow:0 10px 30px rgba(24,23,18,.1);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:'Hanken Grotesk',system-ui,sans-serif;background:var(--paper);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.65;-webkit-tap-highlight-color:transparent}
  a{color:var(--acc);text-decoration:none}img{display:block;max-width:100%}
  ::selection{background:var(--acc);color:#fff}
  :focus-visible{outline:2.5px solid var(--acc);outline-offset:3px;border-radius:3px}
  .mono{font-family:'Space Grotesk',sans-serif}.serif{font-family:'Fraunces',serif}
  .ic{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0}

  header{position:sticky;top:0;z-index:100;background:rgba(243,241,234,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  .hbar{display:flex;align-items:center;gap:14px;height:60px;max-width:1240px;margin:0 auto;padding:0 24px}
  .back{display:inline-flex;align-items:center;gap:8px;color:var(--muted);font-weight:600;font-size:14px}
  .back:hover{color:var(--ink)}.back svg{width:16px;height:16px}
  .htitle{font-family:'Fraunces',serif;font-weight:500;font-size:16px;padding-left:14px;border-left:1px solid var(--line);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .hprog{margin-left:auto;display:flex;align-items:center;gap:10px;flex-shrink:0}
  .hprog .pb{width:120px;height:6px;background:var(--line);border-radius:4px;overflow:hidden}
  .hprog .pb i{display:block;height:100%;width:0;background:var(--acc);border-radius:4px;transition:width .5s var(--ease)}
  .hprog .pl{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;color:var(--muted)}

  .layout{max-width:1240px;margin:0 auto;padding:26px 24px 70px;display:grid;grid-template-columns:290px 1fr;gap:30px;align-items:start}

  .side{position:sticky;top:80px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}
  .side .sh{padding:18px 20px;border-bottom:1px solid var(--line)}
  .side .sh .t{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
  .side .sh .s{font-size:13px;color:var(--ink);margin-top:6px}
  .side .sh .pb{height:5px;background:var(--line);border-radius:4px;margin-top:10px;overflow:hidden}
  .side .sh .pb i{display:block;height:100%;width:0;background:var(--acc);border-radius:4px;transition:width .5s var(--ease)}
  .ulist{padding:8px}
  .uitem{display:flex;align-items:center;gap:12px;padding:12px;border-radius:10px;cursor:pointer;transition:background .15s;border:1px solid transparent}
  .uitem:hover{background:var(--paper2)}.uitem.cur{background:var(--acc-soft);border-color:#cdd3fb}
  .uitem.lock{opacity:.5;cursor:not-allowed}
  .uitem .ix{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--line2);display:grid;place-items:center;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;color:var(--faint);flex-shrink:0}
  .uitem.cur .ix{border-color:var(--acc);color:var(--acc)}
  .uitem.done .ix{background:var(--acc);border-color:var(--acc);color:#fff}
  .uitem .ut{font-size:14px;font-weight:600;line-height:1.3}.uitem .ud{font-family:'Space Grotesk',sans-serif;font-size:11px;color:var(--faint);margin-top:1px}
  .uitem .lk{margin-left:auto;color:var(--faint)}.uitem .lk svg{width:15px;height:15px}

  .main{min-width:0}
  .crumb{font-family:'Space Grotesk',sans-serif;font-size:12.5px;font-weight:600;color:var(--acc);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
  .main h1{font-family:'Fraunces',serif;font-weight:400;font-size:clamp(28px,3.6vw,40px);letter-spacing:-.02em;line-height:1.1;margin-bottom:8px}
  .umeta{font-family:'Space Grotesk',sans-serif;font-size:13px;color:var(--faint);margin-bottom:24px;display:flex;gap:16px;flex-wrap:wrap}
  .umeta .m{display:flex;align-items:center;gap:6px}.umeta .ic{width:14px;height:14px;stroke:var(--faint)}

  .media{border-radius:var(--r);overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow);margin-bottom:26px;aspect-ratio:16/8;background:#e9e7df}
  .media img{width:100%;height:100%;object-fit:cover}

  .prose p{font-size:16.5px;margin-bottom:15px}
  .prose h3{font-family:'Fraunces',serif;font-weight:500;font-size:21px;margin:26px 0 10px;letter-spacing:-.01em}
  .prose ul{list-style:none;margin:4px 0 16px}
  .prose ul li{position:relative;padding:6px 0 6px 24px;font-size:16px}
  .prose ul li::before{content:'';position:absolute;left:2px;top:15px;width:6px;height:6px;border-radius:50%;background:var(--acc)}
  .prose b,.prose strong{font-weight:700}
  .note{background:var(--paper2);border:1px solid var(--line);border-left:3px solid var(--acc);border-radius:0 12px 12px 0;padding:14px 18px;margin:18px 0;font-size:15.5px}
  .compare{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px 0}
  .compare .col{border-radius:12px;padding:16px 18px;border:1px solid var(--line)}
  .compare .col.bad{background:var(--bad-s);border-color:#f0cfcb}.compare .col.good{background:var(--ok-s);border-color:#c6e6d2}
  .compare h5{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-bottom:7px}
  .compare .bad h5{color:var(--bad)}.compare .good h5{color:var(--ok)}
  .compare p{font-size:14.5px;margin:0}

  .tl{margin:6px 0 4px}
  .tl .ev{position:relative;padding:0 0 18px 26px;border-left:2px solid var(--line2);margin-left:6px}
  .tl .ev:last-child{border-left-color:transparent;padding-bottom:0}
  .tl .ev::before{content:'';position:absolute;left:-8px;top:2px;width:13px;height:13px;border-radius:50%;background:var(--acc);box-shadow:0 0 0 3px var(--acc-soft)}
  .tl .ev .yr{font-family:'Space Grotesk',sans-serif;font-weight:700;color:var(--acc);font-size:14.5px}
  .tl .ev .ti{font-weight:700;font-size:15.5px;margin:1px 0 2px}
  .tl .ev p{margin:0;font-size:14.5px;color:var(--muted);line-height:1.5}

  .hs{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;margin:26px 0}
  .hs .ht{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:13px;color:var(--ink);margin-bottom:12px;display:flex;align-items:center;gap:10px}
  .hs .ht .tag{font-size:10.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--acc);background:var(--acc-soft);padding:3px 9px;border-radius:100px}
  .hs a.r{display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;color:var(--ink);font-weight:600;font-size:14px;transition:border-color .2s,transform .12s}
  .hs a.r:last-child{margin-bottom:0}.hs a.r:hover{border-color:var(--acc);transform:translateX(3px)}
  .hs a.r .src{margin-left:auto;font-family:'Space Grotesk',sans-serif;font-size:11.5px;color:var(--faint);display:flex;align-items:center;gap:8px}

  .quiz{margin-top:28px;background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:24px}
  .quiz .ql{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-bottom:12px}
  .quiz .q{font-size:18px;font-weight:600;line-height:1.4;margin-bottom:16px}
  .opts{display:flex;flex-direction:column;gap:10px}
  .opt{display:flex;gap:12px;align-items:flex-start;text-align:left;background:var(--paper2);border:1.5px solid var(--line2);border-radius:12px;padding:14px 16px;font-family:inherit;font-size:15.5px;color:var(--ink);cursor:pointer;transition:border-color .15s,background .15s;line-height:1.4}
  .opt:hover:not(:disabled){border-color:var(--acc);background:var(--acc-soft)}
  .opt .mk{width:25px;height:25px;border-radius:7px;background:#fff;border:1px solid var(--line2);display:grid;place-items:center;font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:12.5px;color:var(--muted);flex-shrink:0}
  .opt.correct{border-color:var(--ok);background:var(--ok-s)}.opt.correct .mk{background:var(--ok);border-color:var(--ok);color:#fff}
  .opt.wrong{border-color:var(--bad);background:var(--bad-s)}.opt.wrong .mk{background:var(--bad);border-color:var(--bad);color:#fff}
  .opt:disabled{cursor:default}
  .fb{margin-top:12px;border-radius:11px;padding:13px 15px;font-size:14.5px;line-height:1.55;display:none}
  .fb.show{display:block}.fb.ok{background:var(--ok-s);color:#155f3b}.fb.no{background:var(--bad-s);color:#9a2a23}.fb b{font-weight:700}

  .nav-foot{display:flex;justify-content:space-between;align-items:center;margin-top:26px;gap:12px}
  .btn{display:inline-flex;align-items:center;gap:9px;font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:15px;padding:13px 22px;border-radius:11px;cursor:pointer;border:1px solid var(--line2);background:var(--card);color:var(--ink)}
  .btn:disabled{opacity:.4;cursor:not-allowed}
  .btn.pri{background:var(--acc);color:#fff;border-color:var(--acc)}.btn.pri:not(:disabled):hover{background:var(--acc-d)}
  .btn svg{width:16px;height:16px;fill:currentColor}
  .lockhint{font-family:'Space Grotesk',sans-serif;font-size:13px;color:var(--faint);font-weight:600;display:flex;align-items:center;gap:8px}
  .lockhint svg{width:15px;height:15px;stroke:var(--faint);fill:none;stroke-width:2}

  .done-card{text-align:center;background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);padding:44px 30px}
  .done-card .k{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--acc);margin-bottom:12px}
  .done-card h1{font-family:'Fraunces',serif;font-weight:400;font-size:34px;margin-bottom:10px}
  .done-card p{color:var(--muted);max-width:52ch;margin:0 auto 8px;font-size:16px}
  .done-card .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:22px}

  @media(max-width:900px){
    .layout{grid-template-columns:1fr;gap:18px}.side{position:static;order:-1}
    .ulist{display:flex;overflow-x:auto;padding:10px;gap:8px}
    .uitem{flex-direction:column;min-width:118px;text-align:center;align-items:center}
    .uitem .lk,.uitem .ud{display:none}.uitem .ut{font-size:12.5px}
    .compare{grid-template-columns:1fr}.htitle{display:none}
  }
  @media (prefers-reduced-motion:reduce){*{transition-duration:.01ms!important}}
</style>

<script>
const SESSION='s6', NEXT='sesion-7.html', EXAM='examen-intermedio.html';
const ph=id=>`https://images.unsplash.com/photo-${id}?auto=format&fit=crop&w=1100&q=72`;
const ext=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 17L17 7M9 7h8v8"/></svg>`;

const UNITS=[
  {
    short:'Qué automatizar',dur:'6 min',title:'Qué es automatizar (y qué no)',
    media:ph('1552664730-d307ca884978'),alt:'Equipo revisando juntos sus procesos de trabajo.',
    html:`<div class="prose">
      <p>Automatizar es simple de explicar: es lograr que el CRM haga solo una tarea repetitiva que hoy hacés a mano. En HubSpot eso se arma con un <b>workflow</b> (un flujo de trabajo). Vos definís las reglas una vez, y a partir de ahí el sistema las ejecuta sin que tengas que estar encima.</p>
      <p>Pensalo así: cada vez que entra un interesado por el formulario de la web, alguien tiene que mandarle un mail de bienvenida y crear una tarea para que un vendedor lo llame. Si eso lo hacés veinte veces por día a mano, perdés tiempo y, tarde o temprano, te olvidás de alguno. Un workflow hace esas dos cosas siempre, al instante, sin fallar.</p>
      <h3>El caos no se automatiza</h3>
      <p>Acá está la trampa más común. Si tu proceso es un desorden, automatizarlo no lo arregla: lo acelera. Vas a repartir el mismo lío, pero más rápido y a más gente. <b>Primero ordenás el proceso a mano; recién después lo automatizás.</b></p>
      <div class="compare"><div class="col bad"><h5>No conviene automatizar</h5><p>Algo que cambia cada vez, que necesita criterio humano o que todavía no entendés bien cómo se hace.</p></div><div class="col good"><h5>Sí conviene automatizar</h5><p>Una tarea clara, repetitiva y siempre igual: mandar el mismo mail, crear la misma tarea, mover un negocio de etapa.</p></div></div>
      <div class="note"><b>Regla de oro:</b> si no sabés explicar el proceso paso a paso en una servilleta, todavía no está listo para automatizar.</div>
    </div>`,
    hs:[{t:'Automatizá tus procesos con HubSpot',u:'https://knowledge.hubspot.com/get-started/automate-your-processes',k:'HubSpot KB'},{t:'Crear workflows',u:'https://knowledge.hubspot.com/workflows/create-workflows',k:'HubSpot KB'}],
    q:'Tu proceso de seguimiento de interesados es un desorden: cada vendedor hace lo que le parece. ¿Qué conviene hacer antes de automatizarlo?',
    opts:[
      {t:'Automatizarlo ya mismo; el workflow va a poner orden solo.',ok:false,fb:'No. Automatizar un caos solo lo hace más rápido. El desorden se reparte igual, pero a más gente y al instante.'},
      {t:'Ordenar y definir el proceso a mano primero, y recién después armar el workflow.',ok:true,fb:'Exacto. Primero el proceso claro, después la automatización. Si no, automatizás el lío.'},
      {t:'Dejarlo como está; total, automatizar no cambia nada.',ok:false,fb:'Sí cambia: lo acelera. Por eso conviene ordenar antes, para que la velocidad juegue a favor.'},
      {t:'Pedir más vendedores para que hagan el desorden más rápido.',ok:false,fb:'Sumar gente a un proceso desordenado multiplica el problema. Primero se ordena.'},
    ]
  },
  {
    short:'El disparador',dur:'6 min',title:'El disparador: "si pasa esto…"',
    media:ph('1460925895917-afdab827c52f'),alt:'Persona configurando una condición en una pantalla.',
    html:`<div class="prose">
      <p>Todo workflow arranca con una pregunta: <b>¿cuándo se tiene que activar?</b> Eso es el disparador, que en HubSpot se llama <b>trigger</b> o criterio de inscripción. Es la primera mitad de la regla: <i>"si pasa esto…"</i>.</p>
      <p>El disparador decide qué registros entran al flujo y en qué momento. Si lo configurás mal, le mandás cosas a la persona equivocada o en el momento equivocado. Por eso vale la pena pensarlo bien.</p>
      <h3>Las tres formas de disparar</h3>
      <ul>
        <li><b>Cuando pasa un evento:</b> por ejemplo, cuando alguien completa un formulario. Entra justo en ese momento.</li>
        <li><b>Cuando se cumple una condición:</b> por ejemplo, cuando la ciudad del contacto es Rosario, o el negocio llega a cierta etapa.</li>
        <li><b>Según una fecha:</b> por ejemplo, tres días antes del vencimiento de un contrato.</li>
      </ul>
      <p>Por defecto, cada registro entra <b>una sola vez</b>, la primera que cumple la condición. Si querés que pueda volver a entrar más adelante, eso se activa aparte con la reinscripción (lo vemos en la última unidad).</p>
      <div class="note"><b>Tip:</b> antes de prender el workflow, mirá cuántos registros cumplen el disparador hoy. Así sabés a cuántos les va a llegar apenas lo actives.</div>
    </div>`,
    hs:[{t:'Configurar los disparadores de inscripción',u:'https://knowledge.hubspot.com/workflows/set-your-workflow-enrollment-triggers',k:'HubSpot KB'},{t:'Disparadores basados en eventos',u:'https://knowledge.hubspot.com/workflows/set-event-enrollment-triggers',k:'HubSpot KB'}],
    q:'Querés que un contacto entre al workflow justo en el momento en que completa el formulario de contacto. ¿Qué tipo de disparador usás?',
    opts:[
      {t:'Uno basado en un evento (cuando se completa el formulario).',ok:true,fb:'Correcto. El evento "se completó el formulario" inscribe al contacto exactamente en ese momento.'},
      {t:'Uno basado en una fecha fija del calendario.',ok:false,fb:'La fecha sirve para cosas como vencimientos, no para reaccionar al instante a una acción de la persona.'},
      {t:'Ninguno; los contactos entran solos sin definir nada.',ok:false,fb:'No entran solos. Sin un disparador definido, el workflow no inscribe a nadie.'},
      {t:'Uno que inscriba a todos los contactos de la base, siempre.',ok:false,fb:'Eso le mandaría el flujo a gente que nunca completó el formulario. El disparador tiene que ser preciso.'},
    ]
  },
  {
    short:'Las acciones',dur:'7 min',title:'Las acciones: "…hacé aquello"',
    media:ph('1517245386807-bb43f82c33c4'),alt:'Lista de pasos y tareas organizadas en orden.',
    html:`<div class="prose">
      <p>Si el disparador es la primera mitad de la regla (<i>"si pasa esto…"</i>), las <b>acciones</b> son la segunda mitad: <i>"…hacé aquello"</i>. Son las cosas concretas que el workflow ejecuta para cada registro que entró.</p>
      <p>Las acciones se ejecutan <b>en orden, de arriba hacia abajo</b>, como una receta. El registro va pasando por cada paso, uno detrás del otro.</p>
      <h3>Acciones que vas a usar todo el tiempo</h3>
      <ul>
        <li><b>Mandar un email</b> (de bienvenida, de seguimiento, un recordatorio).</li>
        <li><b>Crear una tarea</b> para que un vendedor llame o haga el seguimiento.</li>
        <li><b>Actualizar una propiedad</b> (por ejemplo, marcar el origen del contacto).</li>
        <li><b>Notificar a una persona</b> del equipo de que pasó algo importante.</li>
        <li><b>Mover un negocio de etapa</b> dentro del pipeline.</li>
      </ul>
      <p>La gracia está en encadenarlas. Un workflow típico de un interesado nuevo: le manda el mail de bienvenida, le crea una tarea al vendedor y avisa por una notificación. Todo a partir de un solo disparador.</p>
      <div class="note"><b>Cuidá el orden:</b> si querés crear la tarea recién después de saludar a la persona, poné primero el email y después la tarea. El workflow respeta la secuencia tal como la armaste.</div>
    </div>`,
    hs:[{t:'Elegir las acciones de tu workflow',u:'https://knowledge.hubspot.com/workflows/choose-your-workflow-actions',k:'HubSpot KB'},{t:'Crear workflows desde cero',u:'https://knowledge.hubspot.com/workflows/create-workflows-from-scratch',k:'HubSpot KB'}],
    q:'Querés que el contacto reciba primero un mail de bienvenida y, después, que se le cree una tarea al vendedor. ¿Cómo lo armás?',
    opts:[
      {t:'Pongo la acción de email primero y la de crear tarea después, en ese orden.',ok:true,fb:'Eso. Las acciones se ejecutan de arriba hacia abajo, así que el orden en que las ponés es el orden en que pasan.'},
      {t:'No importa el orden; el workflow las hace todas al azar.',ok:false,fb:'No es al azar. Las acciones corren en secuencia, en el orden exacto en que las armaste.'},
      {t:'Solo se puede poner una acción por workflow.',ok:false,fb:'Se pueden encadenar varias. De hecho, esa es la gracia: varias acciones a partir de un disparador.'},
      {t:'Pongo la tarea primero porque siempre va antes que el email.',ok:false,fb:'No hay una regla fija. Si querés que el mail salga primero, va primero en la lista.'},
    ]
  },
  {
    short:'Esperas y caminos',dur:'7 min',title:'Esperas y bifurcaciones',
    media:ph('1551434678-e076c223a692'),alt:'Persona analizando un camino con dos opciones posibles.',
    html:`<div class="prose">
      <p>No todo tiene que pasar de golpe. Dos herramientas te dan ritmo y criterio: las <b>esperas</b> y las <b>bifurcaciones</b>.</p>
      <h3>Esperas (delays)</h3>
      <p>Una espera es una pausa. Le decís al workflow: "después de mandar el mail, esperá 2 días antes del próximo paso". Sirve para no apurar a la persona ni bombardearla. También podés esperar hasta una fecha concreta, o hasta que la persona haga algo.</p>
      <h3>Bifurcaciones (caminos si/no)</h3>
      <p>Una bifurcación parte el camino en dos según una condición. Es la lógica de <b>si/entonces</b> (if-then): "¿abrió el mail?". Si <b>sí</b>, va por un camino; si <b>no</b>, va por otro.</p>
      <ul>
        <li><b>Camino sí:</b> abrió el mail → mandale la propuesta.</li>
        <li><b>Camino no:</b> no lo abrió → esperá un día y reenviá el mensaje.</li>
      </ul>
      <p>Juntas son muy potentes: mandás un mail, <b>esperás</b> dos días para darle tiempo a la persona, y recién ahí <b>bifurcás</b> según lo que hizo. El orden importa: si bifurcás sin esperar, todavía nadie tuvo tiempo de reaccionar y casi todos caen en el camino "no".</p>
      <div class="note"><b>Truco habitual:</b> poné una espera <i>antes</i> de la bifurcación. Así la condición se evalúa cuando la persona ya tuvo chance de actuar.</div>
    </div>`,
    hs:[{t:'Usar esperas (delays) en tus workflows',u:'https://knowledge.hubspot.com/workflows/use-delays',k:'HubSpot KB'},{t:'Usar bifurcaciones si/entonces en workflows',u:'https://knowledge.hubspot.com/workflows/use-if-then-branches-in-workflows',k:'HubSpot KB'}],
    q:'Querés bifurcar según si el contacto abrió o no el mail. ¿Por qué conviene poner una espera antes de la bifurcación?',
    opts:[
      {t:'Para que la persona tenga tiempo de abrir el mail antes de que se evalúe la condición.',ok:true,fb:'Exacto. Sin la espera, casi todos caen en el camino "no abrió", porque todavía no tuvieron chance de hacerlo.'},
      {t:'Porque las bifurcaciones no funcionan sin una espera adelante.',ok:false,fb:'Sí funcionan sin espera. El tema es que la condición daría un resultado injusto: nadie tuvo tiempo de actuar.'},
      {t:'Para que el workflow corra más rápido.',ok:false,fb:'Al revés: la espera agrega una pausa a propósito. La ganancia es que la decisión se toma con información real.'},
      {t:'No conviene; siempre hay que bifurcar de inmediato.',ok:false,fb:'No. Bifurcar de inmediato evalúa antes de que la persona pueda reaccionar, y el resultado queda sesgado.'},
    ]
  },
  {
    short:'Metas y loops',dur:'6 min',title:'Metas y cuidado con los loops',
    media:ph('1556761175-5973dc0f32e7'),alt:'Equipo midiendo resultados y revisando que todo funcione bien.',
    html:`<div class="prose">
      <p>Un buen workflow sabe cuándo <b>parar</b>. Si no, podés terminar molestando a la gente con mensajes que ya no tienen sentido. Dos cosas te ayudan a evitarlo: las metas y el cuidado con los loops.</p>
      <h3>Metas (goals)</h3>
      <p>La meta es el objetivo del flujo. Por ejemplo: que el interesado pida una reunión. Cuando una persona <b>cumple la meta</b>, sale automáticamente del workflow, aunque le faltaran pasos. Tiene toda la lógica: si ya pidió la reunión, no tiene sentido seguir mandándole los mails que justamente buscaban eso.</p>
      <div class="compare"><div class="col bad"><h5>Sin meta</h5><p>La persona ya pidió la reunión, pero igual le siguen llegando los mails que la invitaban a pedirla. Queda raro y molesta.</p></div><div class="col good"><h5>Con meta</h5><p>Apenas pide la reunión, sale del flujo. Deja de recibir los mensajes que ya no corresponden.</p></div></div>
      <h3>Cuidado con los loops</h3>
      <p>Un <b>loop</b> es cuando una automatización se dispara a sí misma sin parar. Pasa, por ejemplo, si un workflow cambia una propiedad que a la vez es el disparador de otro workflow… que vuelve a cambiar algo… y así en círculo. El resultado: mensajes y tareas repetidos que molestan de más.</p>
      <ul>
        <li>Revisá que una acción no termine reactivando el mismo flujo.</li>
        <li>Sé prudente con la <b>reinscripción</b>: activala solo si de verdad querés que la persona vuelva a entrar.</li>
        <li>Probá el workflow con pocos registros antes de soltarlo a toda la base.</li>
      </ul>
      <div class="note"><b>La regla humana:</b> antes de prender un workflow, preguntate "¿esto le sirve a la persona que lo recibe, o solo nos sirve a nosotros?". Si molesta, sobra.</div>
    </div>`,
    hs:[{t:'Usar metas (goals) en workflows de contactos',u:'https://knowledge.hubspot.com/workflows/unenroll-contacts-in-contact-based-workflows-with-goals',k:'HubSpot KB'},{t:'Agregar disparadores de reinscripción a un workflow',u:'https://knowledge.hubspot.com/workflows/add-re-enrollment-triggers-to-a-workflow',k:'HubSpot KB'}],
    q:'Un contacto está en un workflow que lo invita a pedir una reunión, y justo pide la reunión. ¿Qué hace una meta bien puesta?',
    opts:[
      {t:'Lo saca del workflow automáticamente, así deja de recibir los mails que ya no corresponden.',ok:true,fb:'Correcto. Cumplida la meta, la persona sale del flujo y no la seguís molestando con mensajes sin sentido.'},
      {t:'Le sigue mandando todos los mails igual, hasta terminar la secuencia.',ok:false,fb:'Eso es lo que pasa SIN meta, y queda raro: le insistís con algo que ya hizo. La meta justamente evita eso.'},
      {t:'Lo vuelve a inscribir desde el principio una y otra vez.',ok:false,fb:'No. Eso sería un loop molesto. La meta hace lo contrario: lo saca del flujo.'},
      {t:'Borra al contacto del CRM.',ok:false,fb:'Para nada. La meta solo lo desinscribe del workflow; el contacto y su historial quedan intactos.'},
    ]
  },
];

const LS='refindable_sesion_'+SESSION;
let state={unlocked:0,passed:{}};try{state=Object.assign(state,JSON.parse(localStorage.getItem(LS)||'{}'))}catch(e){}
const save=()=>{try{localStorage.setItem(LS,JSON.stringify(state))}catch(e){}};
function markDone(){try{const k='refindable_academy_progress_v1';const p=JSON.parse(localStorage.getItem(k)||'{}');p[SESSION]=true;localStorage.setItem(k,JSON.stringify(p));}catch(e){}}
let cur=Math.min(state.unlocked,UNITS.length-1), finished=UNITS.every((_,i)=>state.passed[i]);
const ulist=document.getElementById('ulist'),main=document.getElementById('main');
const check='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M20 6L9 17l-5-5"/></svg>';

function renderSide(){
  ulist.innerHTML='';
  UNITS.forEach((u,i)=>{
    const locked=i>state.unlocked;
    const it=document.createElement('div');
    it.className='uitem'+(i===cur&&!finished?' cur':'')+(state.passed[i]?' done':'')+(locked?' lock':'');
    it.innerHTML=`<span class="ix">${state.passed[i]?'✓':(i+1)}</span><div><div class="ut">${u.short}</div><div class="ud">${u.dur}</div></div>${locked?'<span class="lk"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></svg></span>':''}`;
    if(!locked)it.addEventListener('click',()=>{cur=i;finished=false;renderAll();scrollTo({top:0,behavior:'smooth'});});
    ulist.appendChild(it);
  });
  const p=Object.keys(state.passed).filter(k=>state.passed[k]).length;
  document.getElementById('sideSub').textContent=`${p} de ${UNITS.length} unidades`;
  document.getElementById('sbar').style.width=(p/UNITS.length*100)+'%';
  document.getElementById('hbar').style.width=(p/UNITS.length*100)+'%';
  document.getElementById('hpct').textContent=Math.round(p/UNITS.length*100)+'%';
}
function renderMain(){
  if(finished){renderFinish();return;}
  const u=UNITS[cur],solved=!!state.passed[cur];
  const media=u.timeline?`<div class="hs" style="margin-top:0"><div class="ht"><span class="tag">Historia</span> Del Rolodex a la nube</div><div class="tl">${u.timeline}</div></div>`:`<div class="media"><img src="${u.media}" alt="${u.alt}" loading="lazy"></div>`;
  const hs=u.hs.map(r=>`<a class="r" href="${r.u}" target="_blank" rel="noopener"><span>${r.t}</span><span class="src">${r.k} ${ext}</span></a>`).join('');
  const opts=u.opts.map((o,j)=>`<button class="opt" data-j="${j}" data-ok="${o.ok?1:0}"><span class="mk">${String.fromCharCode(65+j)}</span><span>${o.t}</span></button>`).join('');
  main.innerHTML=`
    <div class="crumb">Unidad ${cur+1} de ${UNITS.length}</div>
    <h1>${u.title}</h1>
    <div class="umeta"><span class="m"><svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 2"/></svg>${u.dur} de lectura</span><span class="m">Video próximamente</span></div>
    ${media}
    ${u.html}
    <div class="hs"><div class="ht"><span class="tag">HubSpot</span> Material para esta unidad</div>${hs}</div>
    <div class="quiz"><div class="ql">Repaso rápido</div><div class="q">${u.q}</div><div class="opts">${opts}</div><div class="fb"></div></div>
    <div class="nav-foot">
      <button class="btn" id="prevBtn" ${cur===0?'disabled':''}><svg viewBox="0 0 24 24" fill="currentColor"><path d="M15 18l-6-6 6-6"/></svg> Anterior</button>
      ${solved?'':'<span class="lockhint" id="lh"><svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></svg> Respondé el repaso para continuar</span>'}
      <button class="btn pri" id="nextBtn" ${solved?'':'disabled'}>${cur<UNITS.length-1?'Siguiente':'Terminar'} <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 6l6 6-6 6"/></svg></button>
    </div>`;
  const fb=main.querySelector('.fb');
  main.querySelectorAll('.opt').forEach(opt=>{
    if(solved){opt.disabled=true;if(opt.dataset.ok==='1')opt.classList.add('correct');}
    opt.addEventListener('click',()=>{
      if(state.passed[cur])return;
      const ok=opt.dataset.ok==='1',o=u.opts[+opt.dataset.j];
      main.querySelectorAll('.opt').forEach(x=>x.classList.remove('wrong'));
      if(ok){opt.classList.add('correct');main.querySelectorAll('.opt').forEach(x=>x.disabled=true);
        fb.className='fb ok show';fb.innerHTML='<b>Correcto.</b> '+o.fb;
        state.passed[cur]=true;if(state.unlocked===cur)state.unlocked=cur+1;save();
        document.getElementById('nextBtn').disabled=false;const lh=document.getElementById('lh');if(lh)lh.remove();renderSide();
      }else{opt.classList.add('wrong');fb.className='fb no show';fb.innerHTML='<b>Todavía no.</b> '+o.fb+' Probá de nuevo.';}
    });
  });
  const pb=document.getElementById('prevBtn');if(pb)pb.addEventListener('click',()=>{if(cur>0){cur--;renderAll();scrollTo({top:0,behavior:'smooth'});}});
  document.getElementById('nextBtn').addEventListener('click',()=>{
    if(!state.passed[cur])return;
    if(cur<UNITS.length-1){cur++;renderAll();scrollTo({top:0,behavior:'smooth'});}
    else{finished=true;markDone();renderAll();scrollTo({top:0,behavior:'smooth'});}
  });
}
function renderFinish(){
  main.innerHTML=`<div class="done-card">
    <div class="k">Sesión completa</div>
    <h1 class="serif">¡Terminaste la Sesión 6!</h1>
    <p>Ya sabés qué conviene automatizar y qué no, cómo funcionan los disparadores y las acciones, cómo dar ritmo con esperas y bifurcaciones, y cómo poner metas para que la automatización no moleste de más.</p>
    <p style="font-weight:600;color:var(--ink)">Quedate con esto: primero ordenás el proceso, después lo automatizás, y siempre con la pregunta de si le sirve a la persona que lo recibe.</p>
    <div class="actions">
      <a class="btn pri" href="${NEXT}">Ir a la Sesión 7 <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 6l6 6-6 6"/></svg></a>
      <a class="btn" href="${EXAM}">Rendir el examen Intermedio</a>
      <a class="btn" href="./">Volver a la academia</a>
    </div>
  </div>`;
}
function renderAll(){renderSide();renderMain();}
renderAll();
</script>
